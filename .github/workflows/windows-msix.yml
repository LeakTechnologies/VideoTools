name: Windows MSIX Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    paths:
      - ".github/workflows/windows-msix.yml"
      - "packaging/windows/**"
      - "scripts/**.ps1"
      - "scripts/**.bat"
      - "install.ps1"
      - "install.bat"
      - "setup-windows.bat"
      - "docs/INSTALL_WINDOWS.md"
      - "docs/WINDOWS_PACKAGING.md"
      - "internal/**/windows*"
      - "internal/**/*_windows.go"
      - "main.go"

jobs:
  build-msix:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup MSYS2 + FFmpeg dev libs
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-ffmpeg

      - name: Build Windows binary (native_media)
        shell: pwsh
        run: |
          $msys2 = "C:\msys64\ucrt64"
          $env:GOOS    = "windows"
          $env:GOARCH  = "amd64"
          $env:CGO_ENABLED = "1"
          $env:CC  = "$msys2\bin\gcc.exe"
          $env:CXX = "$msys2\bin\g++.exe"
          # Append MSYS2 include/lib paths — the hardcoded C:/ffmpeg paths in
          # engine.go are silently ignored when that directory doesn't exist.
          $env:CGO_CFLAGS  = "-I$msys2\include"
          $env:CGO_LDFLAGS = "-L$msys2\lib"
          $env:PATH = "$msys2\bin;" + $env:PATH

          $buildVersion = git describe --tags --always 2>$null
          $ldflags = "-s -w -H windowsgui -X main.BuildVersion=$buildVersion"

          New-Item -ItemType Directory -Force dist\windows | Out-Null
          go build -tags native_media -ldflags $ldflags -o dist\windows\VideoTools.exe
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Build complete: $(Get-Item dist\windows\VideoTools.exe | Select-Object -ExpandProperty Length) bytes"

      - name: Bundle FFmpeg DLLs alongside exe
        shell: pwsh
        run: |
          # Pre-populate the MSIX layout dir so pack.ps1 finds the DLLs already there.
          # pack.ps1 uses New-Item -Force which won't clear existing files.
          $layoutDir = "dist\windows\msix\layout"
          New-Item -ItemType Directory -Force $layoutDir | Out-Null

          $msys2Bin = "C:\msys64\ucrt64\bin"

          # FFmpeg shared libs
          Get-ChildItem $msys2Bin -Filter "av*.dll"  | Copy-Item -Destination $layoutDir -Force
          Get-ChildItem $msys2Bin -Filter "sw*.dll"  | Copy-Item -Destination $layoutDir -Force

          # MinGW runtime DLLs that the above depend on
          @(
            "libgcc_s_seh-1.dll",
            "libwinpthread-1.dll",
            "libstdc++-6.dll",
            "zlib1.dll",
            "libbz2-1.dll",
            "liblzma-5.dll"
          ) | ForEach-Object {
            $src = Join-Path $msys2Bin $_
            if (Test-Path $src) {
              Copy-Item $src $layoutDir -Force
              Write-Host "Copied $_"
            }
          }

          Write-Host "Layout DLLs: $((Get-ChildItem $layoutDir -Filter *.dll).Count)"

      - name: Set version
        id: version
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if ($tag -match '^v(\d+\.\d+\.\d+)$') {
            $version = $Matches[1]
          } else {
            $version = "0.1.1"
          }
          $msixVersion = "$version.0"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "msix_version=$msixVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package MSIX
        shell: pwsh
        run: |
          ./packaging/windows/msix/pack.ps1 -InputExe dist/windows/VideoTools.exe -Version ${{ steps.version.outputs.msix_version }}

      - name: Generate WinGet manifest
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $msixPath = "dist/windows/msix/VideoTools.msix"
          $sha = (Get-FileHash -Path $msixPath -Algorithm SHA256).Hash
          $template = Get-Content packaging/windows/winget/VideoTools.template.yaml -Raw
          $content = $template.Replace('${VERSION}', $version).Replace('${SHA256}', $sha)
          New-Item -ItemType Directory -Force dist/windows/winget | Out-Null
          Set-Content -Path dist/windows/winget/VideoTools.yaml -Value $content

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoTools-msix
          path: dist/windows/msix/VideoTools.msix

      - name: Upload WinGet manifest
        uses: actions/upload-artifact@v4
        with:
          name: VideoTools-winget
          path: dist/windows/winget/VideoTools.yaml

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/msix/VideoTools.msix
            dist/windows/winget/VideoTools.yaml
