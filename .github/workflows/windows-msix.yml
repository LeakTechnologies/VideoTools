name: Windows MSIX Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    paths:
      - ".github/workflows/windows-msix.yml"
      - "packaging/windows/**"
      - "scripts/**.ps1"
      - "scripts/**.bat"
      - "install.ps1"
      - "install.bat"
      - "setup-windows.bat"
      - "docs/INSTALL_WINDOWS.md"
      - "docs/WINDOWS_PACKAGING.md"
      - "internal/**/windows*"
      - "internal/**/*_windows.go"
      - "main.go"

jobs:
  build-msix:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install MinGW-w64 (standalone, no MSYS2)
        shell: pwsh
        run: |
          # winlibs standalone GCC — just a zip, no installer, no MSYS2
          $url = "https://github.com/brechtsanders/winlibs_mingw/releases/download/14.3.0posix-12.0.0-ucrt-r1/winlibs-x86_64-posix-seh-gcc-14.3.0-mingw-w64ucrt-12.0.0-r1.zip"
          $zip = "C:\mingw.zip"
          Write-Host "Downloading MinGW..."
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Write-Host "Extracting..."
          Expand-Archive -Path $zip -DestinationPath "C:\mingw-extract" -Force
          # The zip contains a single top-level folder (mingw64)
          $inner = Get-ChildItem "C:\mingw-extract" -Directory | Select-Object -First 1
          Move-Item $inner.FullName "C:\mingw64" -Force
          Remove-Item $zip, "C:\mingw-extract" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "GCC: $((& 'C:\mingw64\bin\gcc.exe' --version)[0])"

      - name: Setup FFmpeg dev libs (BtbN shared → C:\ffmpeg)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          $zip = "C:\ffmpeg-shared.zip"
          Write-Host "Downloading FFmpeg shared build..."
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Write-Host "Extracting..."
          Expand-Archive -Path $zip -DestinationPath "C:\ffmpeg-extract" -Force
          $inner = Get-ChildItem "C:\ffmpeg-extract" -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force "C:\ffmpeg" | Out-Null
          Get-ChildItem $inner.FullName | Move-Item -Destination "C:\ffmpeg" -Force
          Remove-Item $zip, "C:\ffmpeg-extract" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "FFmpeg include: $(Test-Path 'C:\ffmpeg\include')"
          Write-Host "FFmpeg lib:     $(Test-Path 'C:\ffmpeg\lib')"
          Write-Host "FFmpeg bin:     $(Get-ChildItem 'C:\ffmpeg\bin\av*.dll' | Measure-Object | Select-Object -ExpandProperty Count) av*.dll files"

      - name: Build Windows binary (native_media)
        shell: pwsh
        run: |
          $env:GOOS        = "windows"
          $env:GOARCH      = "amd64"
          $env:CGO_ENABLED = "1"
          $env:CC          = "C:\mingw64\bin\gcc.exe"
          $env:CXX         = "C:\mingw64\bin\g++.exe"
          $env:PATH        = "C:\mingw64\bin;" + $env:PATH

          $buildVersion = git describe --tags --always 2>$null
          $ldflags = "-s -w -H windowsgui -X main.BuildVersion=$buildVersion"

          New-Item -ItemType Directory -Force dist\windows | Out-Null
          go build -tags native_media -ldflags $ldflags -o dist\windows\VideoTools.exe
          if ($LASTEXITCODE -ne 0) { exit 1 }

          $size = [math]::Round((Get-Item dist\windows\VideoTools.exe).Length / 1MB, 1)
          Write-Host "Build complete: ${size} MB"

      - name: Bundle FFmpeg DLLs into dll\ subfolder
        shell: pwsh
        run: |
          # DLLs go in layout/dll/ — the app's bootstrap code checks <exe>/dll/ at startup
          $dllDir = "dist\windows\msix\layout\dll"
          New-Item -ItemType Directory -Force $dllDir | Out-Null

          Get-ChildItem "C:\ffmpeg\bin\av*.dll" | Copy-Item -Destination $dllDir -Force
          Get-ChildItem "C:\ffmpeg\bin\sw*.dll" | Copy-Item -Destination $dllDir -Force

          $count = (Get-ChildItem $dllDir -Filter *.dll).Count
          Write-Host "Bundled $count DLLs into dll\"

      - name: Set version
        id: version
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if ($tag -match '^v(\d+\.\d+\.\d+)$') {
            $version = $Matches[1]
          } else {
            $version = "0.1.1"
          }
          $msixVersion = "$version.0"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "msix_version=$msixVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package MSIX
        shell: pwsh
        run: |
          ./packaging/windows/msix/pack.ps1 -InputExe dist/windows/VideoTools.exe -Version ${{ steps.version.outputs.msix_version }}

      - name: Generate WinGet manifest
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $msixPath = "dist/windows/msix/VideoTools.msix"
          $sha = (Get-FileHash -Path $msixPath -Algorithm SHA256).Hash
          $template = Get-Content packaging/windows/winget/VideoTools.template.yaml -Raw
          $content = $template.Replace('${VERSION}', $version).Replace('${SHA256}', $sha)
          New-Item -ItemType Directory -Force dist/windows/winget | Out-Null
          Set-Content -Path dist/windows/winget/VideoTools.yaml -Value $content

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoTools-msix
          path: dist/windows/msix/VideoTools.msix

      - name: Upload WinGet manifest
        uses: actions/upload-artifact@v4
        with:
          name: VideoTools-winget
          path: dist/windows/winget/VideoTools.yaml

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/msix/VideoTools.msix
            dist/windows/winget/VideoTools.yaml
