# VideoTools Dev CI — runs on every push to master
name: dev

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FFMPEG_VERSION: "8.1"
  CGO_LDFLAGS_ALLOW: "-Wl,.*"

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /opt/ffmpeg
          key: ffmpeg-${{ runner.os }}-${{ vars.FFMPEG_CACHE_VERSION || 'v3' }}

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake mercurial autoconf libtool nasm yasm pkg-config \
            libx11-dev libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev \
            libxxf86vm-dev libvulkan-dev libxinerama-dev libasound2-dev

      - name: Build FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/ffmpeg /tmp/ffmpeg-src
          curl -L "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_VERSION}.tar.xz" | tar xJ -C /tmp/ffmpeg-src --strip=1
          cd /tmp/ffmpeg-src
          ./configure --prefix=/opt/ffmpeg --enable-static --disable-shared \
            --disable-programs --disable-doc \
            --enable-gpl --enable-version3 --pkg-config-flags="--static"
          make -j$(nproc)
          make install

      - name: Build VideoTools (Linux)
        run: |
          export PKG_CONFIG_PATH=/opt/ffmpeg/lib/pkgconfig
          export CGO_CFLAGS="-I/opt/ffmpeg/include"
          export CGO_LDFLAGS="$(pkg-config --libs --static libavcodec libavformat libswscale libavutil libswresample libavfilter) -lstdc++ -lm"
          export CGO_ENABLED=1
          go build -tags native_media -o VideoTools .

      - name: Package
        run: |
          VERSION=$(head -1 VERSION 2>/dev/null || echo "dev")
          tar czf "VideoTools_${VERSION}_linux_amd64.tar.gz" VideoTools
      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: VideoTools_*.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            base-devel
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-nasm
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-diffutils
            mingw-w64-ucrt-x86_64-libwinpthread-git
            tar unzip curl

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: C:\ffmpeg-static
          key: ffmpeg-${{ runner.os }}-${{ vars.FFMPEG_CACHE_VERSION || 'v4' }}

      - name: Build FFmpeg (shared + static)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          export PATH="/ucrt64/bin:/usr/bin:$PATH"
          curl -L "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_VERSION}.tar.xz" | tar xJ
          cd ffmpeg-${FFMPEG_VERSION}
          ./configure --prefix=/c/ffmpeg-static --enable-static --disable-shared \
            --disable-programs --disable-doc --enable-gpl --enable-version3
          make -j$(nproc)
          make install

      - name: Build VideoTools (Windows)
        shell: msys2 {0}
        run: |
          export GOROOT=$(ls -d /c/hostedtoolcache/windows/go/*/x64 2>/dev/null | tail -1)
          export PATH="/ucrt64/bin:/usr/bin:${GOROOT}/bin:${PATH}"
          export CGO_CFLAGS="-I/c/ffmpeg-static/include -g0"
          export CGO_LDFLAGS="-LC:/ffmpeg-static/lib -lavcodec -lavformat -lavutil -lswscale -lswresample -lavfilter -lbcrypt -lSecur32 -lWs2_32 -lmfplat -lstrmiids -lavrt -lole32 -luser32 -loleaut32 -lgdi32 -lpsapi -static-libgcc -static-libstdc++ -Wl,-Bstatic,-lstdc++,-lpthread -Wl,-Bdynamic"
          export CGO_ENABLED=1
          export CC=$(cygpath -m /ucrt64/bin/gcc)
          windres scripts/videotools.rc -O coff -o videotools_windows_amd64.syso || true
          go build -tags native_media -o VideoTools.exe .

      - name: Package
        shell: pwsh
        run: |
          $version = if (Test-Path VERSION) { Get-Content VERSION -Raw | ForEach-Object { $_.Trim() } } else { "dev" }
          Compress-Archive -Path VideoTools.exe -DestinationPath "VideoTools_${version}_windows_amd64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: VideoTools_*.zip
