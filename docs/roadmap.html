<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoTools Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --vt-navy: #0F1529;
    --vt-navy-light: #1a1f35;
    --vt-card: #252a42;
    --vt-border: #2d3456;
    --vt-text: #e2e8f0;
    --vt-text-muted: #94a3b8;

    --shipped: #22c55e;
    --done: #14b8a6;
    --active: #eab308;
    --planned: #3b82f6;
    --future: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'IBM Plex Mono', 'SF Mono', 'Fira Code', monospace;
    background: var(--vt-navy); color: var(--vt-text); padding: 2rem;
  }
  .page-header { display: flex; align-items: center; gap: 1.2rem; margin-bottom: 0.25rem; }
  .page-header img { height: 48px; width: auto; object-fit: contain; }
  h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
  .subtitle { color: var(--vt-text-muted); margin-bottom: 1.5rem; font-size: 0.85rem; letter-spacing: 0.02em; }
  .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .controls button {
    padding: 0.4rem 0.9rem; border-radius: 999px; border: 1.5px solid var(--vt-border);
    background: var(--vt-navy-light); cursor: pointer; font-size: 0.75rem; font-weight: 500;
    font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.03em;
    color: var(--vt-text); transition: all 0.15s;
  }
  .controls button:hover { border-color: var(--vt-text-muted); }
  .controls button.active { border-color: var(--vt-text); background: var(--vt-text); color: var(--vt-navy); }
  .filter-label { font-size: 0.7rem; color: var(--vt-text-muted); display: flex; align-items: center; padding: 0 0.25rem; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
  .legend {
    display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;
    padding: 0.75rem 1rem; background: var(--vt-navy-light); border-radius: 8px;
    border: 1px solid var(--vt-border);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: var(--vt-text-muted); }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); }
  .board {
    display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; min-height: 70vh;
    cursor: grab; user-select: none;
  }
  .board.panning { cursor: grabbing; }
  .column {
    min-width: 230px; max-width: 250px; flex-shrink: 0;
    background: var(--vt-navy-light); border-radius: 10px; border: 1px solid var(--vt-border);
    display: flex; flex-direction: column;
  }
  .column-header {
    padding: 0.75rem 1rem; font-weight: 600; font-size: 0.82rem; color: #fff;
    border-bottom: 1px solid var(--vt-border); border-radius: 10px 10px 0 0;
    display: flex; justify-content: space-between; align-items: center;
    text-transform: uppercase; letter-spacing: 0.07em;
  }
  .column-count { font-size: 0.75rem; color: rgba(255,255,255,0.6); font-weight: 400; }
  .column-body { padding: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .card {
    padding: 0.6rem 0.8rem; border-radius: 6px; border-left: 3px solid var(--vt-border);
    font-size: 0.8rem; cursor: pointer; transition: all 0.15s; position: relative;
    background: var(--vt-card);
  }
  .card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .card-title { font-weight: 500; color: var(--vt-text); margin-bottom: 0.15rem; }
  .card-desc { font-size: 0.7rem; color: var(--vt-text-muted); line-height: 1.3; }
  .card .cycle-tag {
    display: inline-block; font-size: 0.6rem; padding: 0.1rem 0.35rem;
    border-radius: 3px; background: rgba(255,255,255,0.06); margin-top: 0.25rem;
    color: var(--vt-text-muted);
  }
  .card.shipped { border-left-color: var(--shipped); background: linear-gradient(135deg, var(--vt-card) 60%, rgba(34,197,94,0.08)); }
  .card.done { border-left-color: var(--done); background: linear-gradient(135deg, var(--vt-card) 60%, rgba(20,184,166,0.08)); }
  .card.active { border-left-color: var(--active); background: linear-gradient(135deg, var(--vt-card) 60%, rgba(234,179,8,0.08)); }
  .card.planned { border-left-color: var(--planned); background: linear-gradient(135deg, var(--vt-card) 60%, rgba(59,130,246,0.08)); }
  .card.future { border-left-color: var(--future); background: var(--vt-card); }
  .card.hidden { display: none; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(3px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--vt-navy-light); border-radius: 12px; max-width: 540px; width: 90%;
    max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    border: 1px solid var(--vt-border); padding: 1.5rem; position: relative;
  }
  .modal-close {
    position: absolute; top: 0.75rem; right: 1rem;
    background: none; border: none; font-size: 1.4rem; cursor: pointer;
    color: var(--vt-text-muted); line-height: 1;
  }
  .modal-close:hover { color: var(--vt-text); }
  .modal .status-badge {
    display: inline-block; padding: 0.15rem 0.6rem; border-radius: 999px;
    font-size: 0.7rem; font-weight: 600; margin-bottom: 0.75rem;
  }
  .modal .status-badge.shipped { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid var(--shipped); }
  .modal .status-badge.done { background: rgba(20,184,166,0.15); color: #5eead4; border: 1px solid var(--done); }
  .modal .status-badge.active { background: rgba(234,179,8,0.15); color: #fde047; border: 1px solid var(--active); }
  .modal .status-badge.planned { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid var(--planned); }
  .modal .status-badge.future { background: rgba(107,114,128,0.15); color: #9ca3af; border: 1px solid var(--future); }
  .modal h2 { font-size: 1.2rem; color: var(--vt-text); margin-bottom: 0.5rem; }
  .modal .detail-desc { font-size: 0.9rem; color: var(--vt-text-muted); line-height: 1.5; margin-bottom: 1rem; }
  .modal .detail-section { margin-bottom: 0.75rem; }
  .modal .detail-section h3 {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: #64748b; margin-bottom: 0.3rem;
  }
  .modal .detail-section ul { list-style: none; padding: 0; }
  .modal .detail-section li { font-size: 0.82rem; padding: 0.2rem 0; color: #cbd5e1; }
  .modal .detail-section li::before { content: '\2022'; color: var(--vt-text-muted); margin-right: 0.5rem; }
  .modal .detail-section .code {
    font-family: 'IBM Plex Mono', 'SF Mono', 'Fira Code', monospace; font-size: 0.75rem;
    background: rgba(255,255,255,0.06); padding: 0.1rem 0.3rem; border-radius: 3px;
    color: #cbd5e1;
  }
  .modal .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .modal .detail-section p { font-size: 0.85rem; color: #cbd5e1; }
  @media (max-width: 768px) {
    body { padding: 1rem; }
    .column { min-width: 200px; }
    .modal .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="page-header">
  <img src="../assets/logo/VT_logo.png" alt="VideoTools">
  <h1>Roadmap</h1>
</div>
<p class="subtitle">v0.1.1-dev48 &mdash; Updated 15 May 2026 &mdash; Click any card for details</p>

<div class="legend">
  <span class="legend-item"><span class="legend-swatch" style="background:var(--shipped)"></span> Shipped</span>
  <span class="legend-item"><span class="legend-swatch" style="background:var(--done)"></span> Done (Untested)</span>
  <span class="legend-item"><span class="legend-swatch" style="background:var(--active)"></span> In Progress</span>
  <span class="legend-item"><span class="legend-swatch" style="background:var(--planned)"></span> Planned</span>
  <span class="legend-item"><span class="legend-swatch" style="background:var(--future)"></span> Future</span>
</div>

<div class="controls" id="filters">
  <span class="filter-label">Status</span>
  <button class="active" data-filter="all">All</button>
  <button data-filter="shipped">Shipped</button>
  <button data-filter="done">Done (Untested)</button>
  <button data-filter="active">In Progress</button>
  <button data-filter="planned">Planned</button>
  <button data-filter="future">Future</button>
</div>
<div class="controls" id="module-filters"></div>
<div class="controls" style="margin-top:-0.75rem;">
  <button id="changelogBtn" style="background:var(--vt-card);border-color:var(--done);color:var(--vt-text);display:flex;align-items:center;gap:0.4rem;font-size:0.85rem;padding:0.4rem 1rem;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Changelog
  </button>
</div>

<div class="board" id="board"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="status-badge" id="modalBadge"></div>
    <h2 id="modalTitle"></h2>
    <p class="detail-desc" id="modalDesc"></p>
    <div class="grid-2">
      <div class="detail-section">
        <h3>Module</h3>
        <p id="modalModule" style="font-size:0.85rem;"></p>
      </div>
      <div class="detail-section">
        <h3>Dev Cycle</h3>
        <p id="modalCycle" style="font-size:0.85rem;"></p>
      </div>
    </div>
    <div class="detail-section">
      <h3>Key Files</h3>
      <ul id="modalFiles"></ul>
    </div>
    <div class="detail-section">
      <h3>Dependencies</h3>
      <ul id="modalDeps"></ul>
    </div>
    <div class="detail-section">
      <h3>Related Docs</h3>
      <ul id="modalDocs"></ul>
    </div>
  </div>
</div>

<div class="modal-overlay" id="changelogModal">
  <div class="modal" style="max-width:680px;">
    <button class="modal-close" id="changelogModalClose">&times;</button>
    <h2 style="margin-bottom:1.25rem;display:flex;align-items:center;gap:0.5rem;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--done)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Changelog
    </h2>
    <div id="changelogBody"></div>
  </div>
</div>

const board = document.getElementById('board');

function render() {
  board.innerHTML = '';
  for (const [moduleName, module] of Object.entries(roadmap)) {
    const col = document.createElement('div');
    col.className = 'column';
    col.dataset.module = moduleName;

    const color = moduleColors[moduleName] || '#6366f1';

    const header = document.createElement('div');
    header.className = 'column-header';
    header.style.background = `linear-gradient(135deg, ${color} 0%, ${color}dd 100%)`;
    header.innerHTML = `${moduleName} <span class="column-count"></span>`;

    const body = document.createElement('div');
    body.className = 'column-body';

    for (const item of module.items) {
      const card = document.createElement('div');
      card.className = `card ${item.status}`;
      card.dataset.id = item.id;
      card.innerHTML = `
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.desc}</div>
        <span class="cycle-tag">${item.cycle}</span>
      `;
      card.addEventListener('click', () => openModal(item, moduleName));
      body.appendChild(card);
    }

    col.appendChild(header);
    col.appendChild(body);
    board.appendChild(col);
  }
  updateCounts();
}

let currentStatusFilter = 'all';
let currentModuleFilter = 'all';

function updateCounts() {
  document.querySelectorAll('.column').forEach(col => {
    if (col.style.display === 'none') return;
    const visible = [...col.querySelectorAll('.card:not(.hidden)')].length;
    const total = col.querySelectorAll('.card').length;
    const el = col.querySelector('.column-count');
    el.textContent = visible === total ? total + '' : visible + '/' + total;
  });
}

function applyFilters() {
  document.querySelectorAll('.column').forEach(col => {
    const moduleMatch = currentModuleFilter === 'all' || col.dataset.module === currentModuleFilter;
    col.style.display = moduleMatch ? '' : 'none';
    if (moduleMatch) {
      col.querySelectorAll('.card').forEach(card => {
        const statusMatch = currentStatusFilter === 'all' || card.classList.contains(currentStatusFilter);
        card.classList.toggle('hidden', !statusMatch);
      });
    }
  });
  updateCounts();
}

const filterBtns = document.querySelectorAll('#filters button');
filterBtns.forEach(btn => btn.addEventListener('click', () => {
  currentStatusFilter = btn.dataset.filter;
  filterBtns.forEach(b => b.classList.toggle('active', b.dataset.filter === currentStatusFilter));
  applyFilters();
}));

const modal = document.getElementById('modal');
function openModal(item, moduleName) {
  document.getElementById('modalBadge').className = `status-badge ${item.status}`;
  document.getElementById('modalBadge').textContent = statusLabels[item.status] || item.status;
  document.getElementById('modalTitle').textContent = item.title;
  document.getElementById('modalDesc').textContent = item.desc;
  document.getElementById('modalModule').textContent = moduleName;
  document.getElementById('modalCycle').textContent = item.cycle;

  const filesEl = document.getElementById('modalFiles');
  filesEl.innerHTML = '';
  if (item.files.length === 0) filesEl.innerHTML = '<li style="color:#64748b;">(not yet scoped)</li>';
  else item.files.forEach(f => { const li = document.createElement('li'); li.innerHTML = `<span class="code">${f}</span>`; filesEl.appendChild(li); });

  const depsEl = document.getElementById('modalDeps');
  depsEl.innerHTML = '';
  if (item.deps.length === 0) depsEl.innerHTML = '<li style="color:#64748b;">(none)</li>';
  else item.deps.forEach(d => { const li = document.createElement('li'); li.textContent = d; depsEl.appendChild(li); });

  const docsEl = document.getElementById('modalDocs');
  docsEl.innerHTML = '';
  if (item.docs.length === 0) docsEl.innerHTML = '<li style="color:#64748b;">(none)</li>';
  else item.docs.forEach(d => { const li = document.createElement('li'); li.textContent = d; docsEl.appendChild(li); });

  modal.classList.add('open');
}
document.getElementById('modalClose').addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') modal.classList.remove('open'); });

function buildChangelog() {
  const body = document.getElementById('changelogBody');
  body.innerHTML = '';
  for (const entry of changelogData) {
    const tagColor = entry.tag === 'current' ? 'var(--active)' : entry.tag === 'shipped' ? 'var(--shipped)' : 'var(--future)';
    const tagLabel = entry.tag === 'current' ? 'Current' : entry.tag === 'shipped' ? 'Shipped' : 'Historical';

    const entryEl = document.createElement('div');
    entryEl.style.cssText = 'margin-bottom:1.1rem;border-bottom:1px solid var(--vt-border);padding-bottom:1rem;';

    const hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;align-items:baseline;gap:0.6rem;margin-bottom:0.65rem;';
    hdr.innerHTML = `
      <span style="font-size:0.95rem;font-weight:600;color:var(--vt-text);">${entry.version}</span>
      <span style="font-size:0.72rem;color:var(--vt-text-muted);">${entry.date}</span>
      <span style="font-size:0.62rem;padding:0.08rem 0.45rem;border-radius:999px;background:rgba(255,255,255,0.06);color:${tagColor};border:1px solid ${tagColor};font-weight:600;margin-left:auto;">${tagLabel}</span>`;
    entryEl.appendChild(hdr);

    for (const sec of entry.sections) {
      const secEl = document.createElement('div');
      secEl.style.cssText = 'margin-bottom:0.55rem;';
      const title = document.createElement('div');
      title.style.cssText = 'font-size:0.73rem;font-weight:600;color:#cbd5e1;margin-bottom:0.2rem;letter-spacing:0.02em;';
      title.textContent = sec.title;
      secEl.appendChild(title);
      const ul = document.createElement('ul');
      ul.style.cssText = 'list-style:none;padding:0;margin:0;';
      for (const item of sec.items) {
        const li = document.createElement('li');
        li.style.cssText = 'font-size:0.76rem;color:var(--vt-text-muted);padding:0.1rem 0 0.1rem 0.9rem;position:relative;line-height:1.45;';
        li.innerHTML = `<span style="position:absolute;left:0;color:#475569;">-</span>${item}`;
        ul.appendChild(li);
      }
      secEl.appendChild(ul);
      entryEl.appendChild(secEl);
    }
    body.appendChild(entryEl);
  }
}

document.getElementById('changelogBtn').addEventListener('click', () => {
  buildChangelog();
  document.getElementById('changelogModal').classList.add('open');
});
document.getElementById('changelogModalClose').addEventListener('click', () => {

document.getElementById('changelogModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

render();

// --- Board drag-to-pan (horizontal + vertical) ---
(function() {
  const boardEl = document.getElementById('board');
  let dragging = false, startX = 0, startY = 0, startScrollX = 0, startScrollY = 0, moved = false;

  boardEl.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    dragging = true; moved = false;
    startX = e.clientX; startY = e.clientY;
    startScrollX = boardEl.scrollLeft;
    startScrollY = window.scrollY;
    boardEl.classList.add('panning');
  });

  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
    boardEl.scrollLeft = startScrollX - dx;
    window.scrollTo({ top: startScrollY - dy, behavior: 'instant' });
  });

  window.addEventListener('mouseup', () => {
    dragging = false;
    boardEl.classList.remove('panning');
  });

  // Suppress card click after a drag
  boardEl.addEventListener('click', (e) => {
    if (moved) { e.stopImmediatePropagation(); moved = false; }
  }, true);
})();
