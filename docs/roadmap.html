<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoTools Roadmap</title>
<style>
  :root {
    --shipped: #22c55e; --shipped-bg: #f0fdf4; --shipped-border: #86efac;
    --active: #eab308; --active-bg: #fefce8; --active-border: #fde047;
    --planned: #3b82f6; --planned-bg: #eff6ff; --planned-border: #93c5fd;
    --deferred: #6b7280; --deferred-bg: #f3f4f6; --deferred-border: #d1d5db;
    --blocked: #ef4444; --blocked-bg: #fef2f2; --blocked-border: #fca5a5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8fafc; color: #1e293b; padding: 2rem;
  }
  h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.25rem; }
  .subtitle { color: #64748b; margin-bottom: 1.5rem; font-size: 0.95rem; }
  .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .controls button {
    padding: 0.4rem 0.9rem; border-radius: 999px; border: 1.5px solid #e2e8f0;
    background: #fff; cursor: pointer; font-size: 0.8rem; font-weight: 500;
    transition: all 0.15s;
  }
  .controls button:hover { border-color: #94a3b8; }
  .controls button.active { border-color: #1e293b; background: #1e293b; color: #fff; }
  .legend {
    display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;
    padding: 0.75rem 1rem; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0;
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.1); }
  .board {
    display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; min-height: 70vh;
  }
  .column {
    min-width: 240px; max-width: 260px; flex-shrink: 0;
    background: #fff; border-radius: 10px; border: 1px solid #e2e8f0;
    display: flex; flex-direction: column;
  }
  .column-header {
    padding: 0.75rem 1rem; font-weight: 600; font-size: 0.9rem;
    border-bottom: 1px solid #e2e8f0; border-radius: 10px 10px 0 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .column-count { font-size: 0.75rem; color: #94a3b8; font-weight: 400; }
  .column-body { padding: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .card {
    padding: 0.6rem 0.8rem; border-radius: 6px; border-left: 3px solid #e2e8f0;
    font-size: 0.8rem; cursor: pointer; transition: all 0.15s; position: relative;
  }
  .card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card-title { font-weight: 500; margin-bottom: 0.15rem; }
  .card-desc { font-size: 0.7rem; color: #64748b; line-height: 1.3; }
  .card .cycle-tag {
    display: inline-block; font-size: 0.6rem; padding: 0.1rem 0.35rem;
    border-radius: 3px; background: rgba(0,0,0,0.05); margin-top: 0.25rem;
  }
  .card.shipped { background: var(--shipped-bg); border-left-color: var(--shipped); }
  .card.active { background: var(--active-bg); border-left-color: var(--active); }
  .card.planned { background: var(--planned-bg); border-left-color: var(--planned); }
  .card.deferred { background: var(--deferred-bg); border-left-color: var(--deferred); }
  .card.blocked { background: var(--blocked-bg); border-left-color: var(--blocked); }
  .card.hidden { display: none; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; max-width: 540px; width: 90%;
    max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    padding: 1.5rem; position: relative;
  }
  .modal-close {
    position: absolute; top: 0.75rem; right: 1rem;
    background: none; border: none; font-size: 1.4rem; cursor: pointer;
    color: #94a3b8; line-height: 1;
  }
  .modal-close:hover { color: #1e293b; }
  .modal .status-badge {
    display: inline-block; padding: 0.15rem 0.6rem; border-radius: 999px;
    font-size: 0.7rem; font-weight: 600; margin-bottom: 0.75rem;
  }
  .modal .status-badge.shipped { background: var(--shipped-bg); color: #166534; border: 1px solid var(--shipped-border); }
  .modal .status-badge.active { background: var(--active-bg); color: #854d0e; border: 1px solid var(--active-border); }
  .modal .status-badge.planned { background: var(--planned-bg); color: #1e40af; border: 1px solid var(--planned-border); }
  .modal .status-badge.deferred { background: var(--deferred-bg); color: #4b5563; border: 1px solid var(--deferred-border); }
  .modal .status-badge.blocked { background: var(--blocked-bg); color: #991b1b; border: 1px solid var(--blocked-border); }
  .modal h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
  .modal .detail-desc {
    font-size: 0.9rem; color: #475569; line-height: 1.5; margin-bottom: 1rem;
  }
  .modal .detail-section {
    margin-bottom: 0.75rem;
  }
  .modal .detail-section h3 {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: #94a3b8; margin-bottom: 0.3rem;
  }
  .modal .detail-section ul {
    list-style: none; padding: 0;
  }
  .modal .detail-section li {
    font-size: 0.82rem; padding: 0.2rem 0; color: #334155;
  }
  .modal .detail-section li::before {
    content: '\2022'; color: #94a3b8; margin-right: 0.5rem;
  }
  .modal .detail-section .code {
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.75rem;
    background: #f1f5f9; padding: 0.1rem 0.3rem; border-radius: 3px;
  }
  .modal .grid-2 {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
  }
  @media (max-width: 768px) {
    body { padding: 1rem; }
    .column { min-width: 200px; }
    .modal .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>

<h1>VideoTools Roadmap</h1>
<p class="subtitle">v0.1.1-dev48 &mdash; Updated May 2026 &mdash; Click any card for details</p>

<div class="legend">
  <span class="legend-item"><span class="legend-swatch" style="background:var(--shipped)"></span> Shipped</span>
  <span class="legend-item"><span class="legend-swatch" style="background:var(--active)"></span> In Progress</span>
  <span class="legend-item"><span class="legend-swatch" style="background:var(--planned)"></span> Planned</span>
  <span class="legend-item"><span class="legend-swatch" style="background:var(--deferred)"></span> Deferred</span>
  <span class="legend-item"><span class="legend-swatch" style="background:var(--blocked)"></span> Blocked</span>

<div class="controls" id="filters">
  <button class="active" data-filter="all">All</button>
  <button data-filter="shipped">Shipped</button>
  <button data-filter="active">In Progress</button>
  <button data-filter="planned">Planned</button>
  <button data-filter="deferred">Deferred</button>
  <button data-filter="blocked">Blocked</button>
</div>

<div class="board" id="board"></div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modal">

    </div>
    <div class="detail-section">

      <ul id="modalDocs"></ul>
    </div>
  </div>
</div>

// ── RENDER BOARD ──
const board = document.getElementById('board');
const statusLabels = { shipped: 'Shipped', active: 'In Progress', planned: 'Planned', deferred: 'Deferred', blocked: 'Blocked' };

function render() {
  board.innerHTML = '';
  for (const [moduleName, module] of Object.entries(roadmap)) {
    const col = document.createElement('div');
    col.className = 'column';
    col.dataset.module = moduleName;

    const header = document.createElement('div');
    header.className = 'column-header';
    header.innerHTML = `${moduleName} <span class="column-count"></span>`;

    const body = document.createElement('div');
    body.className = 'column-body';

    for (const item of module.items) {
      const card = document.createElement('div');
      card.className = `card ${item.status}`;
      card.dataset.id = item.id;
      card.innerHTML = `
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.desc}</div>
        <span class="cycle-tag">${item.cycle}</span>
      `;
      card.addEventListener('click', () => openModal(item, moduleName));
      body.appendChild(card);
    }

    col.appendChild(header);
    col.appendChild(body);
    board.appendChild(col);
  }
  updateCounts();
}

// ── FILTERS ──
const filterBtns = document.querySelectorAll('#filters button');
function updateCounts() {
  document.querySelectorAll('.column').forEach(col => {
    const visible = [...col.querySelectorAll('.card:not(.hidden)')].length;
    const total = col.querySelectorAll('.card').length;
    const el = col.querySelector('.column-count');
    el.textContent = visible === total ? total + '' : visible + '/' + total;
  });
}
function setFilter(filter) {
  filterBtns.forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
  document.querySelectorAll('.card').forEach(card => {
    card.classList.toggle('hidden', filter !== 'all' && !card.classList.contains(filter));
  });
  updateCounts();
}
filterBtns.forEach(btn => btn.addEventListener('click', () => setFilter(btn.dataset.filter)));

// ── MODAL ──
const modal = document.getElementById('modal');
function openModal(item, moduleName) {
  document.getElementById('modalBadge').className = `status-badge ${item.status}`;
  document.getElementById('modalBadge').textContent = statusLabels[item.status] || item.status;
  document.getElementById('modalTitle').textContent = item.title;
  document.getElementById('modalDesc').textContent = item.desc;
  document.getElementById('modalModule').textContent = moduleName;
  document.getElementById('modalCycle').textContent = item.cycle;

  const filesEl = document.getElementById('modalFiles');
  filesEl.innerHTML = '';
  if (item.files.length === 0) {
    filesEl.innerHTML = '<li style="color:#94a3b8;">(not yet scoped)</li>';
  } else {
    item.files.forEach(f => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="code">${f}</span>`;
      filesEl.appendChild(li);
    });
  }

  const depsEl = document.getElementById('modalDeps');
  depsEl.innerHTML = '';
  if (item.deps.length === 0) {
    depsEl.innerHTML = '<li style="color:#94a3b8;">(none)</li>';
  } else {
    item.deps.forEach(d => {
      const li = document.createElement('li');
      li.textContent = d;
      depsEl.appendChild(li);
    });
  }

  const docsEl = document.getElementById('modalDocs');
  docsEl.innerHTML = '';
  if (item.docs.length === 0) {
    docsEl.innerHTML = '<li style="color:#94a3b8;">(none)</li>';
  } else {
    item.docs.forEach(d => {
      const li = document.createElement('li');
      li.textContent = d;
      docsEl.appendChild(li);
    });
  }

  modal.classList.add('open');
}
document.getElementById('modalClose').addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') modal.classList.remove('open'); });

render();
</script>
