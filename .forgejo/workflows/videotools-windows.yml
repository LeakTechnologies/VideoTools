name: VideoTools Windows Build

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "internal/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
      - "scripts/**"
      - "packaging/windows/**"

jobs:
  windows-build:
    runs-on: windows
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          
      - name: Build VideoTools
        shell: pwsh
        env:
          VT_MSYS2_ROOT: C:\msys64
          VT_MSYS2_FLAVOR: ucrt64
          VT_BUILD_CHANNEL: ${{ steps.meta.outputs.channel }}
        run: |
          go mod download
          go mod verify
          go build -ldflags="-s -w" -trimpath -o VideoTools.exe .
          
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v3
        with:
          name: VideoTools-windows
          path: |
            VideoTools.exe
            README.md
            LICENSE