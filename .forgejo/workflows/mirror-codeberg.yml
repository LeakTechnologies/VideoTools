name: Mirror to Codeberg

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "*"

jobs:
  mirror:
    runs-on: ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CODEBERG_SSH_KEY:-}" ]; then
            echo "CODEBERG_SSH_KEY secret is required for mirror."
            exit 1
          fi
          mkdir -p "${HOME}/.ssh"
          printf "%s" "${CODEBERG_SSH_KEY}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          ssh-keyscan codeberg.org >> "${HOME}/.ssh/known_hosts"
        env:
          CODEBERG_SSH_KEY: ${{ secrets.CODEBERG_SSH_KEY }}

      - name: Push mirror
        shell: bash
        run: |
          set -euo pipefail
          git remote remove codeberg 2>/dev/null || true
          git remote add codeberg ssh://git@codeberg.org/leak_technologies/VideoTools.git
          GIT_SSH_COMMAND="ssh -i ${HOME}/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            git push --mirror codeberg
