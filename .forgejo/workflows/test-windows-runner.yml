name: Windows Runner Test

on:
  workflow_dispatch:

jobs:
  test-windows-runner:
    runs-on: windows
    defaults:
      run:
        shell: powershell
    steps:
      - name: Test echo
        run: |
          Write-Host "Windows runner is working!" -ForegroundColor Green
          Write-Host "Computer: $env:COMPUTERNAME"
          Write-Host "User: $env:USERNAME"
