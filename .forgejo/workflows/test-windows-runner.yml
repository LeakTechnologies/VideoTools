name: Windows Runner Test

on:
  workflow_dispatch:

jobs:
  test-windows-runner:
    runs-on: windows
    steps:
      - name: Test echo
        run: |
          powershell -Command "Write-Host 'Windows runner is working!' -ForegroundColor Green"
          powershell -Command "Write-Host Computer: $env:COMPUTERNAME"
          powershell -Command "Write-Host User: $env:USERNAME"
