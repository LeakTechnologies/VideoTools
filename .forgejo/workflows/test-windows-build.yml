name: Test Windows Build Trigger

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  test-windows-build:
    runs-on: windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Test Windows Environment
        shell: pwsh
        run: |
          Write-Host "Windows runner is working!" -ForegroundColor Green
          Write-Host "OS: $([System.Environment]::OSVersion)" -ForegroundColor White
          Write-Host "Directory: $(Get-Location)" -ForegroundColor White
          Write-Host "Files in root:" -ForegroundColor Cyan
          Get-ChildItem | Select-Object Name, Length | Format-Table
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          
      - name: Test Go Environment
        shell: pwsh
        run: |
          Write-Host "Go version: $(go version)" -ForegroundColor Green
          Write-Host "Go environment: $(go env GOOS) $(go env GOARCH)" -ForegroundColor White
          
      - name: Build VideoTools Test
        shell: pwsh
        run: |
          Write-Host "Building VideoTools..." -ForegroundColor Yellow
          go mod download
          go mod verify
          go build -ldflags="-s -w" -trimpath -o VideoTools.exe .
          
          if (Test-Path "VideoTools.exe") {
            $size = (Get-Item "VideoTools.exe").Length
            Write-Host "✅ SUCCESS: VideoTools.exe built successfully! Size: $size bytes" -ForegroundColor Green
          } else {
            Write-Host "❌ ERROR: Build failed" -ForegroundColor Red
            exit 1
          }
          
      - name: Upload Test Artifact
        uses: actions/upload-artifact@v3
        with:
          name: VideoTools-windows-test
          path: VideoTools.exe