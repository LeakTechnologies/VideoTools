name: Forgejo Publish Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: dev-packages-${{ github.ref }}
  cancel-in-progress: true

# Bump FFMPEG_VERSION to rebuild static FFmpeg on both Linux and Windows.
# Both jobs use the same source tarball; cache keys include the version.
env:
  FFMPEG_VERSION: "8.1"

jobs:
  linux-package:
    runs-on: ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version_base=""
          if [ -f "VERSION" ]; then
            version_base="$(tr -d '\r\n' < VERSION)"
          fi
          if [ -z "$version_base" ]; then
            version_base="$(grep -m1 'appVersion' main.go | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          if [ -z "$version_base" ]; then
            version_base="v0.1.1-dev"
          fi
          channel="stable"
          if echo "$version_base" | grep -q '\-dev'; then
            channel="dev"
          fi
          echo "version_base=$version_base" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt
            /var/lib/apt
          key: ${{ runner.os }}-apt-build-deps-v1
          restore-keys: |
            ${{ runner.os }}-apt-build-deps-

      - name: Cache static FFmpeg (Linux)
        id: cache-ffmpeg-linux
        uses: actions/cache@v4
        with:
          path: /opt/ffmpeg-static
          key: ffmpeg-static-${{ env.FFMPEG_VERSION }}-linux-v3

      - name: Install build deps
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            pkg-config \
            nasm \
            yasm \
            cmake \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libdrm-dev \
            libasound2-dev \
            tesseract-ocr \
            tesseract-ocr-eng \
            tesseract-ocr-fra \
            wget \
            xz-utils
          DEBIAN_FRONTEND=noninteractive apt-get install -y tesseract-ocr-iku || true

      - name: Setup static FFmpeg (Linux)
        env:
          PKG_CONFIG_PATH: /opt/ffmpeg-static/lib/pkgconfig
        run: |
          set -euo pipefail
          ver="${{ env.FFMPEG_VERSION }}"
          marker="/opt/ffmpeg-static/.built-${ver}-v3"
          if [ -f "$marker" ]; then
            echo "[INFO] FFmpeg ${ver} already built (marker: $marker)"
            exit 0
          fi
          mkdir -p /opt/ffmpeg-static/lib/pkgconfig
          mkdir -p /opt/ffmpeg-static/include

          # Build x264 from source (static only, no DLL)
          echo "[INFO] Building x264 from source (static only)..."
          rm -rf /tmp/x264-src
          git clone --depth=1 https://code.videolan.org/videolan/x264.git /tmp/x264-src
          cd /tmp/x264-src
          ./configure --prefix=/opt/ffmpeg-static --enable-static --disable-shared --disable-opencl --disable-cli
          make -j$(nproc) && make install
          cd /tmp
          rm -rf /tmp/x264-src

          # Build x265 from source (static only, no DLL)
          echo "[INFO] Building x265 from source (static only)..."
          rm -rf /tmp/x265-src /tmp/x265-build
          git clone --depth=1 https://bitbucket.org/multicoreware/x265_git.git /tmp/x265-src
          cd /tmp/x265-src && git tag 4.1.0
          mkdir /tmp/x265-build && cd /tmp/x265-build
          cmake -G "Unix Makefiles" \
                -DCMAKE_INSTALL_PREFIX=/opt/ffmpeg-static \
                -DENABLE_SHARED=OFF -DENABLE_CLI=OFF \
                -DCMAKE_BUILD_TYPE=Release \
                ../x265-src/source
          make -j$(nproc) && make install
          rm -rf /tmp/x265-src /tmp/x265-build

          # Overwrite x265.pc
          echo 'prefix=/opt/ffmpeg-static'           > /opt/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'exec_prefix=${prefix}'            >> /opt/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'libdir=${prefix}/lib'             >> /opt/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'includedir=${prefix}/include'     >> /opt/ffmpeg-static/lib/pkgconfig/x265.pc
          echo ''                                 >> /opt/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'Name: x265'                       >> /opt/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'Description: H.265/HEVC encoder' >> /opt/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'Version: 4.1.0'                   >> /opt/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'Libs: -L${libdir} -lx265 -lstdc++ -lm' >> /opt/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'Cflags: -I${includedir}'         >> /opt/ffmpeg-static/lib/pkgconfig/x265.pc
          cd /tmp

          echo "[INFO] pkg-config diagnostics:"
          echo "  PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          echo "  x265 --exists: $(pkg-config --exists x265 2>&1 && echo OK || echo FAIL)"
          echo "  x265 --libs:   $(pkg-config --libs x265 2>&1 || echo FAIL)"

          # Build FFmpeg from source
          echo "[INFO] Building FFmpeg ${ver} from source..."
          rm -rf /tmp/ffmpeg-src /tmp/ffmpeg.tar.bz2
          wget -q -O /tmp/ffmpeg.tar.bz2 "https://ffmpeg.org/releases/ffmpeg-${ver}.tar.bz2"
          tar xf /tmp/ffmpeg.tar.bz2 -C /tmp
          mv /tmp/ffmpeg-${ver} /tmp/ffmpeg-src
          cd /tmp/ffmpeg-src
          ./configure \
            --prefix=/opt/ffmpeg-static \
            --enable-static --disable-shared --enable-pic \
            --disable-doc --disable-programs --disable-debug \
            --enable-gpl --enable-version3 --enable-avfilter \
            --enable-libx264 --enable-libx265 \
            --disable-vaapi --disable-iconv \
            --extra-cflags='-I/opt/ffmpeg-static/include' \
            --extra-ldflags='-L/opt/ffmpeg-static/lib' \
            || { echo "=== ffbuild/config.log (last 80 lines) ==="; tail -80 ffbuild/config.log 2>/dev/null; exit 1; }
          make -j$(nproc) && make install
          rm -rf /tmp/ffmpeg-src /tmp/ffmpeg.tar.bz2
          cd /tmp

          touch "$marker"
          echo "[INFO] FFmpeg ${ver} Linux build complete"

      - name: Build Linux package
        env:
          PKG_CONFIG_PATH: /opt/ffmpeg-static/lib/pkgconfig
        run: |
          set -euo pipefail
          chmod +x scripts/linux/build.sh
          ./scripts/linux/build.sh

      - name: Build Linux AppImage
        env:
          VT_BUILD_CHANNEL: ${{ steps.meta.outputs.channel }}
        run: |
          mkdir -p .cache/appimage
          curl -L -o .cache/appimage/linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o .cache/appimage/appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x .cache/appimage/linuxdeploy-x86_64.AppImage .cache/appimage/appimagetool-x86_64.AppImage
          chmod +x scripts/linux/package-appimage.sh
          ./scripts/linux/package-appimage.sh

      - name: Normalize Linux artifact name
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ steps.meta.outputs.channel }}"
          version_base="${{ steps.meta.outputs.version_base }}"
          artifact_src="$(ls dist/linux/${channel}/*.zip | head -n1)"
          artifact_dst="dist/linux/${version_base}_linux.zip"
          mv "$artifact_src" "$artifact_dst"
          if [ -d "dist/linux/${channel}" ]; then
            mv "dist/linux/${channel}/"*.AppImage "dist/linux/${version_base}_linux.AppImage"
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v3
        with:
          name: VideoTools-linux
          path: |
            dist/linux/*.zip
            dist/linux/*.AppImage

  windows-package:
    runs-on: windows
    timeout-minutes: 60
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Prepare build metadata
        id: meta
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_OUTPUT)) {
            Write-Error "GITHUB_OUTPUT is not set; cannot emit workflow outputs."
            exit 1
          }
          $versionBase = ""
          if (Test-Path "VERSION") {
            $versionBase = (Get-Content "VERSION" -Raw).Trim()
          }
          if ([string]::IsNullOrWhiteSpace($versionBase)) {
            $appVersionLine = (Get-Content "main.go" | Select-String -Pattern 'appVersion' | Select-Object -First 1).ToString()
            if ($appVersionLine) {
              $parts = $appVersionLine -split ([char]34)
              if ($parts.Length -ge 2) {
                $versionBase = $parts[1]
              }
            }
          }
          if ([string]::IsNullOrWhiteSpace($versionBase)) {
            $versionBase = "v0.1.1-dev"
          }
          $channel = "stable"
          if ($versionBase -match "-dev") {
            $channel = "dev"
          }
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "version_base=$versionBase`n", $utf8NoBom)
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "channel=$channel`n", $utf8NoBom)

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install MSYS2 toolchain and codec deps
        run: |
          $ErrorActionPreference = 'Continue'
          if (-not (Test-Path "C:\msys64\usr\bin\bash.exe")) {
            Write-Error "MSYS2 not found at C:\msys64. Run scripts/ci/bootstrap-windows.ps1 from a user session to set up the runner."
            exit 1
          }
          Write-Host "[INFO] MSYS2 present"

          $bashPath = "C:\msys64\usr\bin\bash.exe"

          function Invoke-Bash([string]$cmd) {
            & $bashPath -lc "( $cmd ) 2>&1" | ForEach-Object { Write-Host "$_" }
            if ($LASTEXITCODE -ne 0) {
              Write-Error "bash command failed (exit $LASTEXITCODE): $cmd"
              exit 1
            }
          }

          # Toolchain
          if (-not (Test-Path "C:\msys64\ucrt64\bin\gcc.exe")) {
            Write-Host "[INFO] Installing ucrt64 toolchain..."
            Invoke-Bash "pacman -Sy --noconfirm && pacman -S --needed --noconfirm base-devel mingw-w64-ucrt-x86_64-toolchain"
          } else {
            Write-Host "[INFO] ucrt64 toolchain present"
          }

          # nasm, cmake
          Write-Host "[INFO] Installing nasm and cmake..."
          Invoke-Bash "pacman -S --needed --noconfirm nasm mingw-w64-ucrt-x86_64-cmake"
          Write-Host "[INFO] Build tools ready"

      - name: Cache static FFmpeg (Windows)
        uses: actions/cache@v4
        with:
          path: C:\ffmpeg-static
          key: ffmpeg-static-${{ env.FFMPEG_VERSION }}-windows-v7

      - name: Setup static FFmpeg (Windows)
        shell: C:/msys64/usr/bin/bash.exe --login -eo pipefail {0}
        env:
          MSYSTEM: UCRT64
        run: |
          ver="${{ env.FFMPEG_VERSION }}"
          marker="/c/ffmpeg-static/.built-${ver}-v7"
          if [ -f "$marker" ]; then
            echo "[INFO] FFmpeg ${ver} already built (marker: $marker)"
            exit 0
          fi
          mkdir -p /c/ffmpeg-static/lib/pkgconfig
          mkdir -p /c/ffmpeg-static/include

          # Build x264 from source (static only)
          echo "[INFO] Building x264 from source (static only)..."
          rm -rf /tmp/x264-src
          git clone --depth=1 https://code.videolan.org/videolan/x264.git /tmp/x264-src
          cd /tmp/x264-src
          ./configure --prefix=/c/ffmpeg-static --enable-static --disable-shared --disable-opencl --disable-cli
          make -j$(nproc) && make install
          cp /c/ffmpeg-static/lib/pkgconfig/x264.pc /ucrt64/lib/pkgconfig/x264.pc
          rm -rf /tmp/x264-src

          # Build x265 from source (static only)
          echo "[INFO] Building x265 from source (static only)..."
          rm -rf /tmp/x265-src /tmp/x265-build
          git clone --depth=1 https://bitbucket.org/multicoreware/x265_git.git /tmp/x265-src
          cd /tmp/x265-src && git tag 4.1.0
          mkdir /tmp/x265-build && cd /tmp/x265-build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_INSTALL_PREFIX=/c/ffmpeg-static \
                -DENABLE_SHARED=OFF -DENABLE_CLI=OFF \
                -DCMAKE_BUILD_TYPE=Release \
                ../x265-src/source
          make -j$(nproc) && make install
          rm -rf /tmp/x265-src /tmp/x265-build

          # Overwrite x265.pc
          echo 'prefix=/c/ffmpeg-static'           > /c/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'exec_prefix=${prefix}'            >> /c/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'libdir=${prefix}/lib'             >> /c/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'includedir=${prefix}/include'     >> /c/ffmpeg-static/lib/pkgconfig/x265.pc
          echo ''                                 >> /c/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'Name: x265'                       >> /c/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'Description: H.265/HEVC encoder' >> /c/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'Version: 4.1.0'                   >> /c/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'Libs: -L${libdir} -lx265 -lstdc++ -lsupc++ -lm' >> /c/ffmpeg-static/lib/pkgconfig/x265.pc
          echo 'Cflags: -I${includedir}'         >> /c/ffmpeg-static/lib/pkgconfig/x265.pc
          cp /c/ffmpeg-static/lib/pkgconfig/x265.pc /ucrt64/lib/pkgconfig/x265.pc

          echo "[INFO] pkg-config diagnostics:"
          echo "  PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          echo "  x265 --exists: $(pkg-config --exists x265 2>&1 && echo OK || echo FAIL)"
          echo "  x265 --libs:   $(pkg-config --libs x265 2>&1 || echo FAIL)"

          # Build FFmpeg from source
          echo "[INFO] Building FFmpeg ${ver} from source..."
          rm -rf /tmp/ffmpeg-src /tmp/ffmpeg.tar.bz2
          wget -q -O /tmp/ffmpeg.tar.bz2 "https://ffmpeg.org/releases/ffmpeg-${ver}.tar.bz2"
          tar xf /tmp/ffmpeg.tar.bz2 -C /tmp
          mv /tmp/ffmpeg-${ver} /tmp/ffmpeg-src
          cd /tmp/ffmpeg-src
          ./configure \
            --prefix=/c/ffmpeg-static \
            --enable-static --disable-shared --enable-pic \
            --disable-doc --disable-programs --disable-debug \
            --enable-gpl --enable-version3 --enable-avfilter \
            --enable-libx264 --enable-libx265 \
            --disable-vaapi --disable-iconv \
            --extra-cflags='-I/c/ffmpeg-static/include -I/ucrt64/include' \
            --extra-ldflags='-L/c/ffmpeg-static/lib -L/ucrt64/lib' \
            || { echo "=== ffbuild/config.log (last 80 lines) ==="; tail -80 ffbuild/config.log 2>/dev/null; exit 1; }
          make -j$(nproc) && make install
          rm -rf /tmp/ffmpeg-src /tmp/ffmpeg.tar.bz2
          cd /tmp

          touch "$marker"
          echo "[INFO] FFmpeg ${ver} Windows build complete"

      - name: Free disk space before Go build
        run: |
          $ErrorActionPreference = 'Continue'
          Remove-Item "C:\msys64\var\cache\pacman\pkg\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\msys64\tmp\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:LOCALAPPDATA\go-build\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Windows\System32\config\systemprofile\AppData\Local\go-build\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:GOPATH\pkg\mod\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Windows\System32\config\systemprofile\go\pkg\mod\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "[INFO] Disk cleanup complete"
          Get-PSDrive C | Select-Object Used, Free | ForEach-Object { Write-Host "[INFO] C: used=$([math]::Round($_.Used/1GB,1))GB free=$([math]::Round($_.Free/1GB,1))GB" }

      - name: Cache shared FFmpeg (Windows)
        id: cache-ffmpeg-shared
        uses: actions/cache@v4
        with:
          path: C:\ffmpeg-shared
          key: ffmpeg-shared-${{ env.FFMPEG_VERSION }}-windows-v1

      - name: Build shared FFmpeg DLLs (Windows)
        if: steps.cache-ffmpeg-shared.outputs.cache-hit != 'true'
        shell: C:/msys64/usr/bin/bash.exe --login -eo pipefail {0}
        env:
          MSYSTEM: UCRT64
        run: |
          ver="${{ env.FFMPEG_VERSION }}"
          # x264/x265 are already built and installed to /c/ffmpeg-static by the
          # static step above. Reuse them for the shared build.
          mkdir -p /c/ffmpeg-shared/lib/pkgconfig
          mkdir -p /c/ffmpeg-shared/include
          mkdir -p /c/ffmpeg-shared/bin
          mkdir -p /c/ffmpeg-shared/dll

          # Build FFmpeg shared (DLLs + CLI tools) from the same source
          echo "[INFO] Building FFmpeg ${ver} shared (DLLs + executables)..."
          rm -rf /tmp/ffmpeg-src /tmp/ffmpeg.tar.bz2
          wget -q -O /tmp/ffmpeg.tar.bz2 "https://ffmpeg.org/releases/ffmpeg-${ver}.tar.bz2"
          tar xf /tmp/ffmpeg.tar.bz2 -C /tmp
          mv /tmp/ffmpeg-${ver} /tmp/ffmpeg-src
          cd /tmp/ffmpeg-src
          ./configure \
            --prefix=/c/ffmpeg-shared \
            --enable-shared --disable-static \
            --enable-doc --enable-programs \
            --enable-gpl --enable-version3 --enable-avfilter \
            --enable-libx264 --enable-libx265 \
            --disable-vaapi --disable-iconv \
            --extra-cflags='-I/c/ffmpeg-static/include -I/ucrt64/include' \
            --extra-ldflags='-L/c/ffmpeg-static/lib -L/ucrt64/lib' \
            || { echo "=== ffbuild/config.log (last 80 lines) ==="; tail -80 ffbuild/config.log 2>/dev/null; exit 1; }
          make -j$(nproc) && make install
          rm -rf /tmp/ffmpeg-src /tmp/ffmpeg.tar.bz2

          # Copy DLLs from bin/ to dll/ subfolder (matches ci-build.ps1 layout)
          cp /c/ffmpeg-shared/bin/*.dll /c/ffmpeg-shared/dll/

          # Copy transitive deps from MSYS2 (e.g. liblzma-5.dll, libstdc++-6.dll, etc.)
          objdumpExe="/ucrt64/bin/objdump.exe"
          if [ -f "$objdumpExe" ]; then
            echo "[INFO] Scanning DLLs for transitive dependencies..."
            declare -A deps
            for dll in /c/ffmpeg-shared/dll/*.dll; do
              while IFS= read -r line; do
                dep=$(echo "$line" | awk -F: '{print $2}' | xargs)
                case "$dep" in
                  KERNEL32.dll|USER32.dll|GDI32.dll|SHELL32.dll|ole32.dll|OLEAUT32.dll|ADVAPI32.dll|MSVCRT.dll|ntdll.dll|win32u.dll|SHLWAPI.dll|VERSION.dll|IMM32.dll|KERNELBASE.dll|WS2_32.dll|oleaut32.dll)
                    continue ;;
                esac
                deps["$dep"]=1
              done < <("$objdumpExe" -p "$dll" 2>/dev/null | grep "DLL Name")
            done
            for dep in "${!deps[@]}"; do
              src="/ucrt64/bin/$dep"
              dst="/c/ffmpeg-shared/dll/$dep"
              if [ -f "$src" ] && [ ! -f "$dst" ]; then
                cp "$src" "$dst"
                echo "[INFO] Copied transitive dep: $dep"
              fi
            done
          fi

          echo "[INFO] FFmpeg ${ver} shared build complete"
          dllCount=$(ls /c/ffmpeg-shared/dll/*.dll 2>/dev/null | wc -l)
          echo "[INFO] ${dllCount} DLLs in /c/ffmpeg-shared/dll/"

      - name: Build Windows package
        env:
          VT_BUILD_CHANNEL: ${{ steps.meta.outputs.channel }}
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
        run: |
          $ErrorActionPreference = 'Continue'
          & (Join-Path $env:GITHUB_WORKSPACE "scripts\windows\ci-build.ps1")
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v3
        with:
          name: VideoTools-windows
          path: |
            dist/windows/*.zip

  publish-release:
    runs-on: ubuntu
    needs:
      - linux-package
      - windows-package
    env:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
      FORGEJO_API_URL: ${{ secrets.FORGEJO_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v3
        with:
          name: VideoTools-linux
          path: dist/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v3
        with:
          name: VideoTools-windows
          path: dist/windows

      - name: Install jq
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y jq

      - name: Prepare publish metadata
        id: publish-meta
        shell: bash
        run: |
          set -euo pipefail
          version_base=""
          if [ -f "VERSION" ]; then
            version_base="$(tr -d '\r\n' < VERSION)"
          fi
          if [ -z "$version_base" ]; then
            version_base="$(grep -m1 'appVersion' main.go | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          if [ -z "$version_base" ]; then
            version_base="v0.1.1-dev"
          fi
          channel="stable"
          if echo "$version_base" | grep -q '\-dev'; then
            channel="dev"
          fi
          echo "version_base=$version_base" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Publish Forgejo release (dev)
        if: env.FORGEJO_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail

          latest_master_sha="$(git ls-remote origin refs/heads/master | awk '{print $1}')"
          if [ -n "${latest_master_sha}" ] && [ "${latest_master_sha}" != "${GITHUB_SHA}" ]; then
            echo "Skipping publish for ${GITHUB_SHA}; newer master commit is ${latest_master_sha}."
            exit 0
          fi

          version_base="${{ steps.publish-meta.outputs.version_base }}"
          channel="${{ steps.publish-meta.outputs.channel }}"

          api_url="${FORGEJO_API_URL}"
          repo="${GITHUB_REPOSITORY}"
          tag="${version_base}"
          name="Build ${version_base}"
          prerelease="false"
          if echo "$version_base" | grep -q '\-dev'; then
            prerelease="true"
          fi

          # Create release
          release_payload=$(jq -n \
            --arg tag "${tag}" \
            --arg name "${name}" \
            --arg body "Nightly build from ${GITHUB_SHA} (Forgejo dev pipeline). Assets are replaced each run." \
            --arg target "${GITHUB_SHA}" \
            --argjson prerelease "${prerelease}" \
            '{
              tag_name: $tag,
              name: $name,
              body: $body,
              draft: false,
              prerelease: $prerelease,
              target_commitish: $target
            }')

          release_json=$(curl -sS -H "Authorization: token ${FORGEJO_TOKEN}" -H "Content-Type: application/json" \
            -X POST "${api_url}/repos/${repo}/releases" -d "${release_payload}" || true)

          release_id=$(echo "${release_json}" | jq -r '.id // empty')
          if [ -z "${release_id}" ]; then
            # Release might already exist, try to get it
            release_json=$(curl -sS -H "Authorization: token ${FORGEJO_TOKEN}" \
              "${api_url}/repos/${repo}/releases/tags/${tag}" || true)
            release_id=$(echo "${release_json}" | jq -r '.id // empty')
          fi

          if [ -z "${release_id}" ]; then
            echo "Failed to create or find release for tag ${tag}."
            echo "${release_json}"
            exit 1
          fi

          # Delete all existing assets so only this build's files remain.
          echo "Pruning stale assets from release ${release_id}..."
          asset_ids=$(curl -sS -H "Authorization: token ${FORGEJO_TOKEN}" \
            "${api_url}/repos/${repo}/releases/${release_id}/assets" \
            | jq -r '.[].id // empty')
          for asset_id in ${asset_ids}; do
            echo "  Deleting asset ${asset_id}..."
            curl -sS -H "Authorization: token ${FORGEJO_TOKEN}" \
              -X DELETE "${api_url}/repos/${repo}/releases/${release_id}/assets/${asset_id}" >/dev/null || true
          done

          # Update release body and target_commitish so the in-app update check
          # matches the binary that was just uploaded.
          curl -sS -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            -X PATCH "${api_url}/repos/${repo}/releases/${release_id}" \
            -d "$(jq -n \
              --arg body "Nightly build from \`${GITHUB_SHA}\` (Forgejo dev pipeline). Assets replaced on each successful push." \
              --arg target "${GITHUB_SHA}" \
              '{body: $body, target_commitish: $target}')" \
            >/dev/null || true

          # Upload Linux assets
          if [ -d "dist/linux" ]; then
            for file in dist/linux/*.zip dist/linux/*.AppImage; do
              if [ -f "$file" ]; then
                name=$(basename "$file")
                echo "Uploading ${name}..."
                curl -fsS -H "Authorization: token ${FORGEJO_TOKEN}" \
                  -H "Content-Type: application/octet-stream" \
                  --data-binary @"${file}" \
                  "${api_url}/repos/${repo}/releases/${release_id}/assets?name=${name}" >/dev/null
              fi
            done
          fi

          # Upload Windows assets
          if [ -d "dist/windows" ]; then
            for file in dist/windows/*.zip; do
              if [ -f "$file" ]; then
                name=$(basename "$file")
                echo "Uploading ${name}..."
                curl -fsS -H "Authorization: token ${FORGEJO_TOKEN}" \
                  -H "Content-Type: application/octet-stream" \
                  --data-binary @"${file}" \
                  "${api_url}/repos/${repo}/releases/${release_id}/assets?name=${name}" >/dev/null
              fi
            done
          fi

          echo "Release ${tag} published successfully."
