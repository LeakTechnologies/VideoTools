name: Forgejo Publish Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: dev-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-package:
    runs-on: ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version_base="$(grep -m1 'appVersion' main.go | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ -z "$version_base" ]; then
            version_base="v0.1.1-dev"
          fi
          channel="stable"
          if echo "$version_base" | grep -q '\-dev'; then
            channel="dev"
          fi
          echo "version_base=$version_base" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build deps
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            pkg-config \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libasound2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            ffmpeg \
            tesseract-ocr \
            tesseract-ocr-eng \
            tesseract-ocr-fra
          DEBIAN_FRONTEND=noninteractive apt-get install -y tesseract-ocr-iku || true

      - name: Build Linux package
        env:
          VT_BUILD_CHANNEL: ${{ steps.meta.outputs.channel }}
        run: |
          chmod +x scripts/linux/build.sh
          ./scripts/linux/build.sh

      - name: Build Linux AppImage
        env:
          VT_BUILD_CHANNEL: ${{ steps.meta.outputs.channel }}
          VT_VERSION_BASE: ${{ steps.meta.outputs.version_base }}
        run: |
          mkdir -p .cache/appimage
          curl -L -o .cache/appimage/linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o .cache/appimage/appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x .cache/appimage/linuxdeploy-x86_64.AppImage .cache/appimage/appimagetool-x86_64.AppImage
          chmod +x scripts/linux/package-appimage.sh
          ./scripts/linux/package-appimage.sh

      - name: Normalize Linux artifact name
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ steps.meta.outputs.channel }}"
          version_base="${{ steps.meta.outputs.version_base }}"
          artifact_src="$(ls dist/linux/${channel}/*.zip | head -n1)"
          artifact_dst="dist/linux/${channel}/${version_base}_linux.zip"
          mv "$artifact_src" "$artifact_dst"

      - name: Build Linux bundled package
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ steps.meta.outputs.channel }}"
          version_base="${{ steps.meta.outputs.version_base }}"
          dist_dir="dist/linux/${channel}"
          bundle_dir="$(mktemp -d)"

          cp VideoTools "$bundle_dir/VideoTools"
          if [ -f README.md ]; then cp README.md "$bundle_dir/"; fi
          if [ -f LICENSE ]; then cp LICENSE "$bundle_dir/"; fi
          if [ -f scripts/linux/run-bundled.sh ]; then
            cp scripts/linux/run-bundled.sh "$bundle_dir/run-bundled.sh"
            chmod +x "$bundle_dir/run-bundled.sh"
          fi

          mkdir -p "$bundle_dir/deps/bin"
          mkdir -p "$bundle_dir/deps/lib"
          if [ -f /usr/bin/ffmpeg ]; then cp /usr/bin/ffmpeg "$bundle_dir/deps/bin/"; fi
          if [ -f /usr/bin/ffprobe ]; then cp /usr/bin/ffprobe "$bundle_dir/deps/bin/"; fi
          if [ -f /usr/bin/tesseract ]; then cp /usr/bin/tesseract "$bundle_dir/deps/bin/"; fi

          gst_bin_paths=(
            "/usr/bin/gst-plugin-scanner"
          )
          for path in "${gst_bin_paths[@]}"; do
            if [ -f "$path" ]; then
              cp "$path" "$bundle_dir/deps/bin/" || true
              break
            fi
          done

          gst_lib_paths=(
            "/usr/lib/x86_64-linux-gnu"
            "/usr/lib64"
            "/usr/lib"
          )
          for path in "${gst_lib_paths[@]}"; do
            if [ -d "$path/gstreamer-1.0" ]; then
              cp -a "$path/gstreamer-1.0" "$bundle_dir/deps/lib/" || true
            fi
            if ls "$path"/libgstreamer-1.0.so* >/dev/null 2>&1; then
              cp -a "$path"/libgstreamer-1.0.so* "$bundle_dir/deps/lib/" || true
            fi
            if ls "$path"/libgst*.so* >/dev/null 2>&1; then
              cp -a "$path"/libgst*.so* "$bundle_dir/deps/lib/" || true
            fi
            if [ -d "$path/gio/modules" ]; then
              mkdir -p "$bundle_dir/deps/lib/gio"
              cp -a "$path/gio/modules" "$bundle_dir/deps/lib/gio/" || true
            fi
          done

          tess_paths=(
            "/usr/share/tesseract-ocr/5/tessdata"
            "/usr/share/tesseract-ocr/4.00/tessdata"
            "/usr/share/tessdata"
          )
          for path in "${tess_paths[@]}"; do
            if [ -d "$path" ]; then
              mkdir -p "$bundle_dir/deps/tessdata"
              for lang in eng fra iku; do
                if [ -f "$path/${lang}.traineddata" ]; then
                  cp "$path/${lang}.traineddata" "$bundle_dir/deps/tessdata/"
                fi
              done
              break
            fi
          done

          mkdir -p "$bundle_dir/models"
          whisper_model_url="https://git.leaktechnologies.dev/lt_mirror/whisper/src/branch/master/ggml-small.bin"
          if command -v curl >/dev/null 2>&1; then
            curl -L --progress-bar -o "$bundle_dir/models/ggml-small.bin" "$whisper_model_url"
          elif command -v wget >/dev/null 2>&1; then
            wget --quiet --show-progress --progress=bar:force -O "$bundle_dir/models/ggml-small.bin" "$whisper_model_url"
          else
            echo "ERROR: curl or wget required to download whisper model."
            exit 1
          fi

          if [ ! -f "$bundle_dir/deps/bin/gst-plugin-scanner" ]; then
            echo "ERROR: GStreamer plugin scanner missing; bundled build requires GStreamer."
            exit 1
          fi
          if [ ! -d "$bundle_dir/deps/lib/gstreamer-1.0" ]; then
            echo "ERROR: GStreamer plugins missing; bundled build requires GStreamer."
            exit 1
          fi
          if [ ! -f "$bundle_dir/deps/tessdata/eng.traineddata" ] || [ ! -f "$bundle_dir/deps/tessdata/fra.traineddata" ]; then
            echo "ERROR: Tesseract language data (eng/fra) missing; bundled build requires them."
            exit 1
          fi

          cat > "$bundle_dir/deps/README.txt" <<'EOF'
          VideoTools bundled dependencies
          - ffmpeg/ffprobe (portable)
          - tesseract OCR + language data (eng/fra required, iku optional)
          - gstreamer runtime + plugins (best-effort)
          - whisper.cpp small model (ggml-small.bin)
          Use run-bundled.sh to launch with deps on PATH.
          EOF

          bundle_zip="${dist_dir}/${version_base}_linux-bundled.zip"
          (cd "$bundle_dir" && zip -qr "$bundle_zip" .)
          rm -rf "$bundle_dir"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v3
        with:
          name: VideoTools-linux
          path: |
            dist/linux/${{ steps.meta.outputs.channel }}/*.zip
            dist/linux/${{ steps.meta.outputs.channel }}/*.AppImage

  windows-package:
    runs-on: windows
    timeout-minutes: 60
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare build metadata
        id: meta
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_OUTPUT)) {
            Write-Error "GITHUB_OUTPUT is not set; cannot emit workflow outputs."
            exit 1
          }
          $appVersionLine = (Get-Content "main.go" | Select-String -Pattern 'appVersion' | Select-Object -First 1).ToString()
          $versionBase = ""
          if ($appVersionLine) {
            $parts = $appVersionLine -split ([char]34)
            if ($parts.Length -ge 2) {
              $versionBase = $parts[1]
            }
          }
          if ([string]::IsNullOrWhiteSpace($versionBase)) {
            $versionBase = "v0.1.1-dev"
          }
          $channel = "stable"
          if ($versionBase -match "-dev") {
            $channel = "dev"
          }
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "version_base=$versionBase`n", $utf8NoBom)
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "channel=$channel`n", $utf8NoBom)

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Windows runner diagnostics
        run: |
          $reportDir = Join-Path $env:GITHUB_WORKSPACE "dist\\windows\\diagnostics"
          New-Item -ItemType Directory -Force -Path $reportDir | Out-Null
          $reportPath = Join-Path $reportDir "windows-runner.txt"

          function Resolve-KitTool {
            param([string]$exeName)
            $cmd = Get-Command $exeName -ErrorAction SilentlyContinue
            if ($cmd) { return $cmd.Path }
            $kitsRoot = "${env:ProgramFiles(x86)}\\Windows Kits\\10\\bin"
            if (-not (Test-Path $kitsRoot)) { return "" }
            $candidates = Get-ChildItem -Path $kitsRoot -Directory | Sort-Object Name -Descending
            foreach ($dir in $candidates) {
              $path = Join-Path $dir.FullName "x64\\$exeName"
              if (Test-Path $path) { return $path }
            }
            return ""
          }

          $osInfo = Get-CimInstance Win32_OperatingSystem | Select-Object Caption, Version, BuildNumber
          $goVersion = ""
          if (Get-Command go -ErrorAction SilentlyContinue) { $goVersion = (go version) }
          $gccVersion = ""
          if (Get-Command gcc -ErrorAction SilentlyContinue) { $gccVersion = (gcc --version | Select-Object -First 1) }
          $windresVersion = ""
          if (Get-Command windres -ErrorAction SilentlyContinue) { $windresVersion = (windres --version | Select-Object -First 1) }
          $makeappxPath = Resolve-KitTool -exeName "makeappx.exe"
          $signtoolPath = Resolve-KitTool -exeName "signtool.exe"

          @(
            "OS: $($osInfo.Caption) $($osInfo.Version) (Build $($osInfo.BuildNumber))",
            "Go: $goVersion",
            "GCC: $gccVersion",
            "windres: $windresVersion",
            "makeappx.exe: " + ($(if ($makeappxPath) { $makeappxPath } else { "MISSING" })),
            "signtool.exe: " + ($(if ($signtoolPath) { $signtoolPath } else { "MISSING" }))
          ) | Out-File -FilePath $reportPath -Encoding UTF8

      - name: Upload Windows diagnostics
        uses: actions/upload-artifact@v3
        with:
          name: VideoTools-windows-diagnostics
          path: dist/windows/diagnostics/windows-runner.txt

      - name: Build Windows package
        env:
          VT_SIGN_EXE: ${{ secrets.VT_SIGN_EXE }}
          VT_SIGN_PFX: ${{ secrets.VT_SIGN_PFX }}
          VT_SIGN_PFX_B64: ${{ secrets.VT_SIGN_PFX_B64 }}
          VT_SIGN_PASSWORD: ${{ secrets.VT_SIGN_PASSWORD }}
          VT_SIGN_TIMESTAMP: ${{ secrets.VT_SIGN_TIMESTAMP }}
        run: |
          $projectRoot = Resolve-Path "."
          $buildOutput = Join-Path $projectRoot "VideoTools.exe"
          $gccPath = (Get-Command gcc -ErrorAction SilentlyContinue).Source
          if ($gccPath) {
            $env:CC = $gccPath
            $env:CXX = $gccPath -replace "gcc\.exe$", "g++.exe"
          }
          $appVersionLine = (Get-Content (Join-Path $projectRoot "main.go") | Select-String -Pattern 'appVersion' | Select-Object -First 1).ToString()
          $appVersion = ""
          if ($appVersionLine) {
            $parts = $appVersionLine -split ([char]34)
            if ($parts.Length -ge 2) {
              $appVersion = $parts[1]
            }
          }
          if ([string]::IsNullOrWhiteSpace($appVersion)) {
            $appVersion = "0.1.1-dev"
          }
          $gitCommit = ""
          if (Get-Command git -ErrorAction SilentlyContinue) {
            $gitCommit = (git -C $projectRoot rev-parse --short HEAD 2>$null).Trim()
          }
          if ([string]::IsNullOrWhiteSpace($gitCommit)) {
            $gitCommit = "nogit"
          }
          $channel = "stable"
          if ($appVersion -match "-dev") {
            $channel = "dev"
          }
          $version = $appVersion
          $distDir = Join-Path $projectRoot "dist\\windows"
          $artifactName = "$version`_windows.zip"

          if ($env:VT_SIGN_PFX_B64) {
            $pfxPath = Join-Path $env:TEMP "vt-sign.pfx"
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:VT_SIGN_PFX_B64))
            $env:VT_SIGN_PFX = $pfxPath
          }

          $rcFile = Join-Path $projectRoot "scripts\\videotools.rc"
          $sysoFile = Join-Path $projectRoot "videotools_windows_amd64.syso"
          if (Test-Path $rcFile) {
            $windresCandidates = @()
            $windresCmd = Get-Command windres -ErrorAction SilentlyContinue
            if ($windresCmd) {
              $windresCandidates += $windresCmd.Path
            }
            $windresCandidates += "C:\\ProgramData\\chocolatey\\bin\\windres.exe"
            $windresCandidates += "C:\\MinGW\\bin\\windres.exe"
            $windresPath = $windresCandidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
            if ($windresPath) {
              & $windresPath $rcFile -O coff -o $sysoFile | Out-Null
            } else {
              Write-Host "[WARN] windres not found; Windows icon will not be embedded." -ForegroundColor Yellow
            }
          }

          $env:CGO_ENABLED = "1"
          go mod download
          go mod verify
          go build -p 4 -ldflags="-s -w -H windowsgui" -trimpath -o $buildOutput .

          if ($env:VT_SIGN_EXE -and $env:VT_SIGN_EXE -ne "0") {
            $signScript = Join-Path $projectRoot "scripts\\windows\\support\\sign-exe.ps1"
            if (Test-Path $signScript) {
              & $signScript -ExePath $buildOutput -CertPath $env:VT_SIGN_PFX -CertPassword $env:VT_SIGN_PASSWORD -TimestampUrl $env:VT_SIGN_TIMESTAMP
            }
          }

          if (-not (Test-Path $distDir)) {
            New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          }
          $pkgDir = New-Item -ItemType Directory -Path (Join-Path $env:TEMP "vt-build-$([Guid]::NewGuid())") -Force
          Copy-Item $buildOutput -Destination $pkgDir.FullName -Force
          if (Test-Path (Join-Path $projectRoot "README.md")) {
            Copy-Item (Join-Path $projectRoot "README.md") -Destination $pkgDir.FullName -Force
          }
          $artifactPath = Join-Path $distDir $artifactName
          if (Test-Path $artifactPath) {
            Remove-Item $artifactPath -Force
          }
          Compress-Archive -Path (Join-Path $pkgDir.FullName "*") -DestinationPath $artifactPath
          Remove-Item $pkgDir.FullName -Recurse -Force

          # Bundled package (with deps)
          $bundleDir = New-Item -ItemType Directory -Path (Join-Path $env:TEMP "vt-bundle-$([Guid]::NewGuid())") -Force
          Copy-Item $buildOutput -Destination $bundleDir.FullName -Force
          if (Test-Path (Join-Path $projectRoot "README.md")) {
            Copy-Item (Join-Path $projectRoot "README.md") -Destination $bundleDir.FullName -Force
          }
          if (Test-Path (Join-Path $projectRoot "LICENSE")) {
            Copy-Item (Join-Path $projectRoot "LICENSE") -Destination $bundleDir.FullName -Force
          }
          if (Test-Path (Join-Path $projectRoot "scripts\\windows\\run-bundled.ps1")) {
            Copy-Item (Join-Path $projectRoot "scripts\\windows\\run-bundled.ps1") -Destination $bundleDir.FullName -Force
          }
          if (Test-Path (Join-Path $projectRoot "scripts\\windows\\run-bundled.bat")) {
            Copy-Item (Join-Path $projectRoot "scripts\\windows\\run-bundled.bat") -Destination $bundleDir.FullName -Force
          }

          $depsBin = Join-Path $bundleDir.FullName "deps\\bin"
          New-Item -ItemType Directory -Force -Path $depsBin | Out-Null

          # FFmpeg bundle
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $ffmpegZip = Join-Path $env:TEMP "ffmpeg-bundle.zip"
          try {
            Invoke-WebRequest -Uri $ffmpegUrl -OutFile $ffmpegZip -UseBasicParsing
            $ffmpegTemp = Join-Path $env:TEMP "ffmpeg-bundle"
            if (Test-Path $ffmpegTemp) { Remove-Item $ffmpegTemp -Recurse -Force }
            Expand-Archive -Path $ffmpegZip -DestinationPath $ffmpegTemp -Force
            $ffmpegExe = Get-ChildItem -Path $ffmpegTemp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
            $ffprobeExe = Get-ChildItem -Path $ffmpegTemp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
            if ($ffmpegExe) { Copy-Item $ffmpegExe.FullName -Destination $depsBin -Force }
            if ($ffprobeExe) { Copy-Item $ffprobeExe.FullName -Destination $depsBin -Force }
          } catch {
            Write-Host "[WARN] Failed to download FFmpeg bundle: $($_.Exception.Message)" -ForegroundColor Yellow
          }

          # Tesseract bundle (best-effort via Chocolatey)
          $tessRoot = Join-Path $env:ProgramFiles "Tesseract-OCR"
          try {
            if (-not (Test-Path $tessRoot) -and (Get-Command choco -ErrorAction SilentlyContinue)) {
              choco install -y tesseract --no-progress
            }
          } catch {
            Write-Host "[WARN] Failed to install Tesseract via Chocolatey: $($_.Exception.Message)" -ForegroundColor Yellow
          }
          if (Test-Path $tessRoot) {
            $tessExe = Join-Path $tessRoot "tesseract.exe"
            if (Test-Path $tessExe) {
              Copy-Item $tessExe -Destination $depsBin -Force
            }
            $tessDataSrc = Join-Path $tessRoot "tessdata"
            $tessDataDst = Join-Path $bundleDir.FullName "deps\\tessdata"
            if (Test-Path $tessDataSrc) {
              New-Item -ItemType Directory -Force -Path $tessDataDst | Out-Null
              foreach ($lang in @("eng", "fra", "iku")) {
                $src = Join-Path $tessDataSrc "$lang.traineddata"
                if (Test-Path $src) {
                  Copy-Item $src -Destination $tessDataDst -Force
                }
              }
            }
          }
          $tessDataDst = Join-Path $bundleDir.FullName "deps\\tessdata"
          $tessEng = Join-Path $tessDataDst "eng.traineddata"
          $tessFra = Join-Path $tessDataDst "fra.traineddata"
          if (-not (Test-Path $tessEng) -or -not (Test-Path $tessFra)) {
            throw "ERROR: Missing required Tesseract language data (eng/fra). Install the language packs before bundling."
          }

          # GStreamer bundle
          $gstRoot = Join-Path ${env:ProgramFiles} "GStreamer\\1.0\\msvc_x86_64"
          try {
            if (-not (Test-Path $gstRoot) -and (Get-Command winget -ErrorAction SilentlyContinue)) {
              winget install --id GStreamer.GStreamer -e --accept-package-agreements --accept-source-agreements
            }
          } catch {
            Write-Host "[WARN] Failed to install GStreamer via winget: $($_.Exception.Message)" -ForegroundColor Yellow
          }
          if (Test-Path $gstRoot) {
            $gstBin = Join-Path $gstRoot "bin"
            $gstLib = Join-Path $gstRoot "lib"
            if (Test-Path $gstBin) {
              Copy-Item -Path (Join-Path $gstBin "*.dll") -Destination $depsBin -Force -ErrorAction SilentlyContinue
              $gstScanner = Join-Path $gstBin "gst-plugin-scanner.exe"
              if (Test-Path $gstScanner) {
                Copy-Item $gstScanner -Destination $depsBin -Force
              }
            }
            if (Test-Path (Join-Path $gstLib "gstreamer-1.0")) {
              $gstPluginDst = Join-Path $bundleDir.FullName "deps\\lib\\gstreamer-1.0"
              New-Item -ItemType Directory -Force -Path $gstPluginDst | Out-Null
              Copy-Item -Path (Join-Path $gstLib "gstreamer-1.0\\*") -Destination $gstPluginDst -Recurse -Force -ErrorAction SilentlyContinue
            }
            if (Test-Path (Join-Path $gstLib "gio\\modules")) {
              $gioDst = Join-Path $bundleDir.FullName "deps\\lib\\gio\\modules"
              New-Item -ItemType Directory -Force -Path $gioDst | Out-Null
              Copy-Item -Path (Join-Path $gstLib "gio\\modules\\*") -Destination $gioDst -Recurse -Force -ErrorAction SilentlyContinue
            }
          }
          $gstScanner = Join-Path $depsBin "gst-plugin-scanner.exe"
          $gstPlugins = Join-Path $bundleDir.FullName "deps\\lib\\gstreamer-1.0"
          if (-not (Test-Path $gstScanner) -or -not (Test-Path $gstPlugins)) {
            throw "ERROR: GStreamer runtime/plugins missing. Install GStreamer 1.0 (msvc_x86_64) before bundling."
          }

          $modelsDir = Join-Path $bundleDir.FullName "models"
          New-Item -ItemType Directory -Force -Path $modelsDir | Out-Null
          $whisperModelUrl = "https://git.leaktechnologies.dev/lt_mirror/whisper/src/branch/master/ggml-small.bin"
          $whisperModelPath = Join-Path $modelsDir "ggml-small.bin"
          try {
            Invoke-WebRequest -Uri $whisperModelUrl -OutFile $whisperModelPath -UseBasicParsing
          } catch {
            throw "ERROR: Failed to download whisper model from $whisperModelUrl"
          }

          $depsNote = @(
            "VideoTools bundled dependencies",
            "- ffmpeg/ffprobe (portable)",
            "- tesseract OCR + language data (eng/fra/iku if available)",
            "- gstreamer runtime + plugins",
            "- whisper.cpp small model (ggml-small.bin)",
            "Use run-bundled.ps1 or run-bundled.bat to launch with deps on PATH."
          ) -join "`r`n"
          $depsNote | Out-File -FilePath (Join-Path $bundleDir.FullName "deps\\README.txt") -Encoding UTF8

          $bundleZip = Join-Path $distDir "$version`_windows-bundled.zip"
          if (Test-Path $bundleZip) { Remove-Item $bundleZip -Force }
          Compress-Archive -Path (Join-Path $bundleDir.FullName "*") -DestinationPath $bundleZip
          Remove-Item $bundleDir.FullName -Recurse -Force

          Write-Host "[INFO] MSIX packaging skipped for host runner mode" -ForegroundColor Yellow

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v3
        with:
          name: VideoTools-windows
          path: |
            dist/windows/*.zip

  publish-release:
    runs-on: ubuntu
    needs:
      - linux-package
      - windows-package
    env:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
      FORGEJO_API_URL: ${{ secrets.FORGEJO_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v3
        with:
          name: VideoTools-linux
          path: dist/linux
        continue-on-error: true

      - name: Download Windows artifacts
        uses: actions/download-artifact@v3
        with:
          name: VideoTools-windows
          path: dist/windows
        continue-on-error: true

      - name: Install jq
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y jq

      - name: Publish Forgejo release (dev)
        if: env.FORGEJO_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${FORGEJO_API_URL:-}" ]; then
            echo "FORGEJO_API_URL is required in secrets."
            exit 1
          fi
          if [ -z "${FORGEJO_TOKEN:-}" ]; then
            echo "FORGEJO_TOKEN is required in secrets."
            exit 1
          fi

          version_base="$(grep -m1 'appVersion' main.go | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ -z "$version_base" ]; then
            version_base="v0.1.1-dev"
          fi
          channel="stable"
          prerelease="false"
          if echo "$version_base" | grep -q '\-dev'; then
            channel="dev"
            prerelease="true"
          fi

          api_url="${FORGEJO_API_URL}"
          repo="${GITHUB_REPOSITORY}"
          tag="${version_base}"
          name="Build ${version_base}"

          release_payload=$(jq -n \
            --arg tag "${tag}" \
            --arg name "${name}" \
            --arg body "Nightly build from ${GITHUB_SHA} (Forgejo dev pipeline). Assets are replaced each run." \
            --arg target "${GITHUB_SHA}" \
            --argjson prerelease "${prerelease}" \
            '{
              tag_name: $tag,
              name: $name,
              body: $body,
              draft: false,
              prerelease: $prerelease,
              target_commitish: $target
            }')

          release_json=$(curl -sS -H "Authorization: token ${FORGEJO_TOKEN}" -H "Content-Type: application/json" \
            -X POST "${api_url}/repos/${repo}/releases" -d "${release_payload}" || true)

          release_id=$(echo "${release_json}" | jq -r '.id // empty')
          if [ -z "${release_id}" ]; then
            release_json=$(curl -sS -H "Authorization: token ${FORGEJO_TOKEN}" \
              "${api_url}/repos/${repo}/releases/tags/${tag}" || true)
            release_id=$(echo "${release_json}" | jq -r '.id // empty')
          fi

          if [ -z "${release_id}" ]; then
            echo "Failed to create or find release for tag ${tag}."
            echo "${release_json}"
            exit 1
          fi

          purge_release_assets() {
            local assets_json
            local delete_error=0
            assets_json=$(curl -fsS -H "Authorization: token ${FORGEJO_TOKEN}" \
              "${api_url}/repos/${repo}/releases/${release_id}/assets")
            if [ -z "${assets_json}" ]; then
              return
            fi
            echo "${assets_json}" | jq -r '.[].id' | while read -r asset_id; do
              if [ -n "${asset_id}" ] && [ "${asset_id}" != "null" ]; then
                echo "Removing existing asset id=${asset_id}..."
                if ! curl -fsS -X DELETE -H "Authorization: token ${FORGEJO_TOKEN}" \
                  "${api_url}/repos/${repo}/releases/assets/${asset_id}" >/dev/null; then
                  echo "Failed to delete asset id=${asset_id}."
                  delete_error=1
                fi
              fi
            done
            if [ "${delete_error}" -ne 0 ]; then
              echo "Asset purge failed; aborting upload."
              exit 1
            fi
          }

          echo "Purging existing release assets..."
          purge_release_assets

          # Upload only existing artifacts
          if [ -d "dist/linux" ]; then
            for file in dist/linux/*.zip dist/linux/*.AppImage; do
              if [ -f "${file}" ]; then
                name=$(basename "${file}")
                echo "Uploading ${name}..."
                curl -fsS -H "Authorization: token ${FORGEJO_TOKEN}" \
                  -H "Content-Type: application/octet-stream" \
                  --data-binary @"${file}" \
                  "${api_url}/repos/${repo}/releases/${release_id}/assets?name=${name}" >/dev/null
              fi
            done
          fi

          if [ -d "dist/windows" ]; then
            for file in dist/windows/*.zip; do
              if [ -f "${file}" ]; then
                name=$(basename "${file}")
                echo "Uploading ${name}..."
                curl -fsS -H "Authorization: token ${FORGEJO_TOKEN}" \
                  -H "Content-Type: application/octet-stream" \
                  --data-binary @"${file}" \
                  "${api_url}/repos/${repo}/releases/${release_id}/assets?name=${name}" >/dev/null
              fi
            done
          fi

      - name: Skip release upload (missing token)
        if: env.FORGEJO_TOKEN == ''
        run: |
          echo "FORGEJO_TOKEN not set; skipping release upload."
