name: Forgejo Publish Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: dev-packages-${{ github.ref }}
  cancel-in-progress: true

# Bump FFMPEG_VERSION to rebuild static FFmpeg on both Linux and Windows.
# Both jobs use the same source tarball; cache keys include the version.
env:
  FFMPEG_VERSION: "8.1"

jobs:
  linux-package:
    runs-on: ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version_base=""
          if [ -f "VERSION" ]; then
            version_base="$(tr -d '\r\n' < VERSION)"
          fi
          if [ -z "$version_base" ]; then
            version_base="$(grep -m1 'appVersion' main.go | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          if [ -z "$version_base" ]; then
            version_base="v0.1.1-dev"
          fi
          channel="stable"
          if echo "$version_base" | grep -q '\-dev'; then
            channel="dev"
          fi
          echo "version_base=$version_base" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt
            /var/lib/apt
          key: ${{ runner.os }}-apt-build-deps-v1
          restore-keys: |
            ${{ runner.os }}-apt-build-deps-

      - name: Cache static FFmpeg (Linux)
        id: cache-ffmpeg-linux
        uses: actions/cache@v4
        with:
          path: /opt/ffmpeg-static
          key: ffmpeg-static-${{ env.FFMPEG_VERSION }}-linux-v1

      - name: Install build deps
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            pkg-config \
            nasm \
            yasm \
            libx264-dev \
            libx265-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libasound2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            ffmpeg \
            tesseract-ocr \
            tesseract-ocr-eng \
            tesseract-ocr-fra
          DEBIAN_FRONTEND=noninteractive apt-get install -y tesseract-ocr-iku || true

      - name: Build static FFmpeg (Linux)
        if: steps.cache-ffmpeg-linux.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          wget -q -O /tmp/ffmpeg.tar.bz2 \
            https://ffmpeg.org/releases/ffmpeg-${{ env.FFMPEG_VERSION }}.tar.bz2
          tar xf /tmp/ffmpeg.tar.bz2 -C /tmp
          cd /tmp/ffmpeg-${{ env.FFMPEG_VERSION }}
          ./configure \
            --prefix=/opt/ffmpeg-static \
            --enable-static \
            --disable-shared \
            --enable-pic \
            --disable-doc \
            --disable-programs \
            --disable-debug \
            --enable-gpl \
            --enable-version3 \
            --enable-avfilter \
            --enable-libx264 \
            --enable-libx265
          make -j$(nproc)
          make install
          rm -rf /tmp/ffmpeg-${{ env.FFMPEG_VERSION }} /tmp/ffmpeg.tar.bz2

      - name: Build Linux package
        env:
          PKG_CONFIG_PATH: /opt/ffmpeg-static/lib/pkgconfig
          VT_BUILD_CHANNEL: ${{ steps.meta.outputs.channel }}
        run: |
          set -euo pipefail
          export CGO_LDFLAGS="$(pkg-config --libs --static libavcodec libavformat libswscale libavutil libswresample 2>/dev/null || true)"
          chmod +x scripts/linux/build.sh
          ./scripts/linux/build.sh

      - name: Build Linux AppImage
        env:
          VT_BUILD_CHANNEL: ${{ steps.meta.outputs.channel }}
          VT_VERSION_BASE: ${{ steps.meta.outputs.version_base }}
        run: |
          mkdir -p .cache/appimage
          curl -L -o .cache/appimage/linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o .cache/appimage/appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x .cache/appimage/linuxdeploy-x86_64.AppImage .cache/appimage/appimagetool-x86_64.AppImage
          chmod +x scripts/linux/package-appimage.sh
          ./scripts/linux/package-appimage.sh

      - name: Normalize Linux artifact name
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ steps.meta.outputs.channel }}"
          version_base="${{ steps.meta.outputs.version_base }}"
          artifact_src="$(ls dist/linux/${channel}/*.zip | head -n1)"
          artifact_dst="dist/linux/${channel}/${version_base}_linux.zip"
          mv "$artifact_src" "$artifact_dst"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v3
        with:
          name: VideoTools-linux
          path: |
            dist/linux/${{ steps.meta.outputs.channel }}/*.zip
            dist/linux/${{ steps.meta.outputs.channel }}/*.AppImage

  windows-package:
    runs-on: windows
    timeout-minutes: 60
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Prepare build metadata
        id: meta
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_OUTPUT)) {
            Write-Error "GITHUB_OUTPUT is not set; cannot emit workflow outputs."
            exit 1
          }
          $versionBase = ""
          if (Test-Path "VERSION") {
            $versionBase = (Get-Content "VERSION" -Raw).Trim()
          }
          if ([string]::IsNullOrWhiteSpace($versionBase)) {
            $appVersionLine = (Get-Content "main.go" | Select-String -Pattern 'appVersion' | Select-Object -First 1).ToString()
            if ($appVersionLine) {
              $parts = $appVersionLine -split ([char]34)
              if ($parts.Length -ge 2) {
                $versionBase = $parts[1]
              }
            }
          }
          if ([string]::IsNullOrWhiteSpace($versionBase)) {
            $versionBase = "v0.1.1-dev"
          }
          $channel = "stable"
          if ($versionBase -match "-dev") {
            $channel = "dev"
          }
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "version_base=$versionBase`n", $utf8NoBom)
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "channel=$channel`n", $utf8NoBom)

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Windows runner diagnostics
        run: |
          $reportDir = Join-Path $env:GITHUB_WORKSPACE "dist\\windows\\diagnostics"
          New-Item -ItemType Directory -Force -Path $reportDir | Out-Null
          $reportPath = Join-Path $reportDir "windows-runner.txt"

          function Resolve-KitTool {
            param([string]$exeName)
            $cmd = Get-Command $exeName -ErrorAction SilentlyContinue
            if ($cmd) { return $cmd.Path }
            $kitsRoot = "${env:ProgramFiles(x86)}\\Windows Kits\\10\\bin"
            if (-not (Test-Path $kitsRoot)) { return "" }
            $candidates = Get-ChildItem -Path $kitsRoot -Directory | Sort-Object Name -Descending
            foreach ($dir in $candidates) {
              $path = Join-Path $dir.FullName "x64\\$exeName"
              if (Test-Path $path) { return $path }
            }
            return ""
          }

          $osInfo = Get-CimInstance Win32_OperatingSystem | Select-Object Caption, Version, BuildNumber
          $goVersion = ""
          if (Get-Command go -ErrorAction SilentlyContinue) { $goVersion = (go version) }
          $gccVersion = ""
          if (Get-Command gcc -ErrorAction SilentlyContinue) { $gccVersion = (gcc --version | Select-Object -First 1) }
          $windresVersion = ""
          if (Get-Command windres -ErrorAction SilentlyContinue) { $windresVersion = (windres --version | Select-Object -First 1) }
          $makeappxPath = Resolve-KitTool -exeName "makeappx.exe"
          $signtoolPath = Resolve-KitTool -exeName "signtool.exe"

          @(
            "OS: $($osInfo.Caption) $($osInfo.Version) (Build $($osInfo.BuildNumber))",
            "Go: $goVersion",
            "GCC: $gccVersion",
            "windres: $windresVersion",
            "makeappx.exe: " + ($(if ($makeappxPath) { $makeappxPath } else { "MISSING" })),
            "signtool.exe: " + ($(if ($signtoolPath) { $signtoolPath } else { "MISSING" }))
          ) | Out-File -FilePath $reportPath -Encoding UTF8

      - name: Upload Windows diagnostics
        uses: actions/upload-artifact@v3
        with:
          name: VideoTools-windows-diagnostics
          path: dist/windows/diagnostics/windows-runner.txt

      - name: Install MSYS2 toolchain and codec deps
        run: |
          $ErrorActionPreference = 'Continue'
          # MSYS2 must be pre-installed on the runner.
          # One-time setup: run scripts/ci/bootstrap-windows.ps1 from a user session,
          # or install from https://www.msys2.org then:
          #   pacman -S --needed --noconfirm base-devel mingw-w64-ucrt-x86_64-toolchain
          if (-not (Test-Path "C:\msys64\usr\bin\bash.exe")) {
            Write-Error "MSYS2 not found at C:\msys64. Run scripts/ci/bootstrap-windows.ps1 from a user session to set up the runner."
            exit 1
          }
          Write-Host "[INFO] MSYS2 present"

          $bashPath = "C:\msys64\usr\bin\bash.exe"

          # Helper: run bash with stderr merged inside bash before PowerShell sees it.
          # Using PowerShell's 2>&1 creates ErrorRecord objects that trigger Stop
          # even after ForEach-Object. Wrapping in a bash subshell with its own
          # 2>&1 means PowerShell only ever receives stdout — no ErrorRecords.
          function Invoke-Bash([string]$cmd) {
            & $bashPath -lc "( $cmd ) 2>&1" | ForEach-Object { Write-Host "$_" }
            if ($LASTEXITCODE -ne 0) {
              Write-Error "bash command failed (exit $LASTEXITCODE): $cmd"
              exit 1
            }
          }

          # Toolchain (gcc, make, etc.)
          if (-not (Test-Path "C:\msys64\ucrt64\bin\gcc.exe")) {
            Write-Host "[INFO] Installing ucrt64 toolchain..."
            Invoke-Bash "pacman -Sy --noconfirm && pacman -S --needed --noconfirm base-devel mingw-w64-ucrt-x86_64-toolchain"
          } else {
            Write-Host "[INFO] ucrt64 toolchain present"
          }

          # Minimal external codec deps for the custom FFmpeg build
          # nasm: assembly optimiser for x264/x265
          # x264/x265: only external libs we enable; everything else is FFmpeg built-in
          Write-Host "[INFO] Installing nasm, x264-dev, x265-dev..."
          Invoke-Bash "pacman -S --needed --noconfirm nasm mingw-w64-ucrt-x86_64-x264 mingw-w64-ucrt-x86_64-x265"
          Write-Host "[INFO] Codec deps ready"

      - name: Build static FFmpeg (Windows)
        shell: C:/msys64/usr/bin/bash.exe --login -eo pipefail {0}
        env:
          MSYSTEM: UCRT64
        run: |
          ver="${{ env.FFMPEG_VERSION }}"
          marker="/c/ffmpeg-static/.built-${ver}"
          if [ -f "$marker" ]; then
            echo "[INFO] FFmpeg ${ver} already built at /c/ffmpeg-static -- skipping"
            exit 0
          fi
          echo "[INFO] Downloading FFmpeg ${ver} source..."
          wget -q -O /tmp/ffmpeg.tar.bz2 "https://ffmpeg.org/releases/ffmpeg-${ver}.tar.bz2"
          tar xf /tmp/ffmpeg.tar.bz2 -C /tmp
          cd "/tmp/ffmpeg-${ver}"
          ./configure \
            --prefix=/c/ffmpeg-static \
            --enable-static \
            --disable-shared \
            --enable-pic \
            --disable-doc \
            --disable-programs \
            --disable-debug \
            --enable-gpl \
            --enable-version3 \
            --enable-avfilter \
            --enable-libx264 \
            --enable-libx265 \
            --extra-cflags='-I/ucrt64/include' \
            --extra-ldflags='-L/ucrt64/lib'
          make -j$(nproc)
          make install
          rm -rf "/tmp/ffmpeg-${ver}" /tmp/ffmpeg.tar.bz2
          touch "$marker"
          echo "[INFO] FFmpeg ${ver} built at /c/ffmpeg-static"

      - name: Build Windows package
        env:
          # SignPath.io (free OSS signing — https://signpath.io/product/open-source)
          # Set these secrets once approved; signing is skipped when absent.
          SIGNPATH_API_TOKEN:       ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          # PFX fallback (dev/self-signed; leave empty to skip)
          VT_SIGN_PFX_B64:   ${{ secrets.VT_SIGN_PFX_B64 }}
          VT_SIGN_PASSWORD:  ${{ secrets.VT_SIGN_PASSWORD }}
          VT_SIGN_TIMESTAMP: ${{ secrets.VT_SIGN_TIMESTAMP }}
        run: |
          $ErrorActionPreference = 'Continue'
          & (Join-Path $env:GITHUB_WORKSPACE "scripts\windows\ci-build.ps1")
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v3
        with:
          name: VideoTools-windows
          path: |
            dist/windows/*.zip

  publish-release:
    runs-on: ubuntu
    needs:
      - linux-package
      - windows-package
    env:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
      FORGEJO_API_URL: ${{ secrets.FORGEJO_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v3
        with:
          name: VideoTools-linux
          path: dist/linux
        continue-on-error: true

      - name: Download Windows artifacts
        uses: actions/download-artifact@v3
        with:
          name: VideoTools-windows
          path: dist/windows
        continue-on-error: true

      - name: Install jq
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y jq

      - name: Publish Forgejo release (dev)
        if: env.FORGEJO_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail

          latest_master_sha="$(git ls-remote origin refs/heads/master | awk '{print $1}')"
          if [ -n "${latest_master_sha}" ] && [ "${latest_master_sha}" != "${GITHUB_SHA}" ]; then
            echo "Skipping publish for ${GITHUB_SHA}; newer master commit is ${latest_master_sha}."
            exit 0
          fi

          if [ -z "${FORGEJO_API_URL:-}" ]; then
            echo "FORGEJO_API_URL is required in secrets."
            exit 1
          fi
          if [ -z "${FORGEJO_TOKEN:-}" ]; then
            echo "FORGEJO_TOKEN is required in secrets."
            exit 1
          fi

          version_base=""
          if [ -f "VERSION" ]; then
            version_base="$(tr -d '\r\n' < VERSION)"
          fi
          if [ -z "$version_base" ]; then
            version_base="$(grep -m1 'appVersion' main.go | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          if [ -z "$version_base" ]; then
            version_base="v0.1.1-dev"
          fi
          channel="stable"
          prerelease="false"
          if echo "$version_base" | grep -q '\-dev'; then
            channel="dev"
            prerelease="true"
          fi

          api_url="${FORGEJO_API_URL}"
          repo="${GITHUB_REPOSITORY}"
          tag="${version_base}"
          name="Build ${version_base}"
          changelog_file="docs/CHANGELOG.md"

          changelog_section=""
          if [ -f "${changelog_file}" ]; then
            changelog_section=$(awk -v ver="${version_base}" '
              BEGIN { capture=0 }
              $0 ~ "^## " {
                if (capture) exit
                if ($0 ~ "^## " ver "([[:space:]]|$)") { capture=1; next }
              }
              capture { print }
            ' "${changelog_file}")
          fi

          release_body="Nightly build from ${GITHUB_SHA} (Forgejo dev pipeline). Assets are replaced each run."
          changelog_highlights=""
          if [ -n "${changelog_section}" ]; then
            changelog_highlights=$(printf '%s\n' "${changelog_section}" | awk '
              BEGIN { count=0 }
              /^- / {
                line=$0
                sub(/^- \*\*/, "- ", line)
                sub(/\*\* - /, ": ", line)
                print line
                count++
                if (count >= 8) exit
              }
            ')
          fi
          if [ -n "${changelog_highlights}" ]; then
            release_body="${release_body}"$'\n\n'"### Highlights (${version_base})"$'\n'"${changelog_highlights}"$'\n\n'"Full details: docs/CHANGELOG.md"
          fi

          release_payload=$(jq -n \
            --arg tag "${tag}" \
            --arg name "${name}" \
            --arg body "${release_body}" \
            --arg target "${GITHUB_SHA}" \
            --argjson prerelease "${prerelease}" \
            '{
              tag_name: $tag,
              name: $name,
              body: $body,
              draft: false,
              prerelease: $prerelease,
              target_commitish: $target
            }')

          release_json=$(curl -sS -H "Authorization: token ${FORGEJO_TOKEN}" -H "Content-Type: application/json" \
            -X POST "${api_url}/repos/${repo}/releases" -d "${release_payload}" || true)

          release_id=$(echo "${release_json}" | jq -r '.id // empty')
          if [ -z "${release_id}" ]; then
            release_json=$(curl -sS -H "Authorization: token ${FORGEJO_TOKEN}" \
              "${api_url}/repos/${repo}/releases/tags/${tag}" || true)
            release_id=$(echo "${release_json}" | jq -r '.id // empty')
          fi

          if [ -z "${release_id}" ]; then
            echo "Failed to create or find release for tag ${tag}."
            echo "${release_json}"
            exit 1
          fi

          update_payload=$(jq -n \
            --arg tag "${tag}" \
            --arg name "${name}" \
            --arg body "${release_body}" \
            --arg target "${GITHUB_SHA}" \
            --argjson prerelease "${prerelease}" \
            '{
              tag_name: $tag,
              name: $name,
              body: $body,
              draft: false,
              prerelease: $prerelease,
              target_commitish: $target
            }')
          curl -fsS -H "Authorization: token ${FORGEJO_TOKEN}" -H "Content-Type: application/json" \
            -X PATCH "${api_url}/repos/${repo}/releases/${release_id}" -d "${update_payload}" >/dev/null

          purge_release_assets() {
            local assets_json
            local delete_error=0
            assets_json=$(curl -fsS -H "Authorization: token ${FORGEJO_TOKEN}" \
              "${api_url}/repos/${repo}/releases/${release_id}/assets")
            if [ -z "${assets_json}" ]; then
              return
            fi
            mapfile -t asset_ids < <(echo "${assets_json}" | jq -r '.[].id')
            for asset_id in "${asset_ids[@]}"; do
              if [ -n "${asset_id}" ] && [ "${asset_id}" != "null" ]; then
                echo "Removing existing asset id=${asset_id}..."
                if ! curl -fsS -X DELETE -H "Authorization: token ${FORGEJO_TOKEN}" \
                  "${api_url}/repos/${repo}/releases/${release_id}/assets/${asset_id}" >/dev/null; then
                  echo "Failed to delete asset id=${asset_id}."
                  delete_error=1
                fi
              fi
            done
            if [ "${delete_error}" -ne 0 ]; then
              echo "Asset purge failed; aborting upload."
              exit 1
            fi
          }

          delete_asset_by_name() {
            local target_name="$1"
            local assets_json asset_id
            assets_json=$(curl -fsS -H "Authorization: token ${FORGEJO_TOKEN}" \
              "${api_url}/repos/${repo}/releases/${release_id}/assets")
            asset_id=$(echo "${assets_json}" | jq -r --arg n "${target_name}" '.[] | select(.name == $n) | .id' | head -n1)
            if [ -n "${asset_id}" ] && [ "${asset_id}" != "null" ]; then
              echo "Removing existing asset name=${target_name} id=${asset_id}..."
              curl -fsS -X DELETE -H "Authorization: token ${FORGEJO_TOKEN}" \
                "${api_url}/repos/${repo}/releases/${release_id}/assets/${asset_id}" >/dev/null
            fi
          }

          echo "Purging existing release assets..."
          purge_release_assets

          # Upload only existing artifacts
          if [ -d "dist/linux" ]; then
            for file in dist/linux/*.zip dist/linux/*.AppImage; do
              if [ -f "${file}" ]; then
                name=$(basename "${file}")
                echo "Uploading ${name}..."
                delete_asset_by_name "${name}"
                curl -fsS -H "Authorization: token ${FORGEJO_TOKEN}" \
                  -H "Content-Type: application/octet-stream" \
                  --data-binary @"${file}" \
                  "${api_url}/repos/${repo}/releases/${release_id}/assets?name=${name}" >/dev/null
              fi
            done
          fi

          if [ -d "dist/windows" ]; then
            for file in dist/windows/*.zip; do
              if [ -f "${file}" ]; then
                name=$(basename "${file}")
                echo "Uploading ${name}..."
                delete_asset_by_name "${name}"
                curl -fsS -H "Authorization: token ${FORGEJO_TOKEN}" \
                  -H "Content-Type: application/octet-stream" \
                  --data-binary @"${file}" \
                  "${api_url}/repos/${repo}/releases/${release_id}/assets?name=${name}" >/dev/null
              fi
            done
          fi

      - name: Skip release upload (missing token)
        if: env.FORGEJO_TOKEN == ''
        run: |
          echo "FORGEJO_TOKEN not set; skipping release upload."
