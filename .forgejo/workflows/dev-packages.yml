name: Forgejo Dev Packages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".forgejo/workflows/dev-packages.yml"
      - "packaging/windows/**"
      - "scripts/**.ps1"
      - "scripts/**.sh"
      - "scripts/**.bat"
      - "docs/WINDOWS_PACKAGING.md"
      - "internal/**"
      - "main.go"
      - "go.mod"
      - "go.sum"

jobs:
  linux-package:
    runs-on: ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version_base="$(grep -m1 'appVersion' main.go | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ -z "$version_base" ]; then
            version_base="v0.1.1-dev"
          fi
          channel="stable"
          if echo "$version_base" | grep -q '\-dev'; then
            channel="dev"
          fi
          echo "version_base=$version_base" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build deps
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            pkg-config \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libasound2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - name: Build Linux package
        env:
          VT_BUILD_CHANNEL: ${{ steps.meta.outputs.channel }}
        run: |
          chmod +x scripts/linux/build.sh
          ./scripts/linux/build.sh

      - name: Normalize Linux artifact name
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ steps.meta.outputs.channel }}"
          version_base="${{ steps.meta.outputs.version_base }}"
          artifact_src="$(ls dist/linux/${channel}/*.zip | head -n1)"
          artifact_dst="dist/linux/${channel}/${version_base}_linux.zip"
          mv "$artifact_src" "$artifact_dst"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VideoTools-linux
          path: dist/linux/${{ steps.meta.outputs.channel }}/*

  windows-package:
    runs-on: windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare build metadata
        id: meta
        shell: pwsh
        run: |
          $appVersionLine = (Get-Content "main.go" | Select-String -Pattern 'appVersion' | Select-Object -First 1).ToString()
          $versionBase = ""
          if ($appVersionLine) {
            $parts = $appVersionLine -split ([char]34)
            if ($parts.Length -ge 2) {
              $versionBase = $parts[1]
            }
          }
          if ([string]::IsNullOrWhiteSpace($versionBase)) {
            $versionBase = "v0.1.1-dev"
          }
          $channel = "stable"
          if ($versionBase -match "-dev") {
            $channel = "dev"
          }
          "version_base=$versionBase" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-toolchain

      - name: Build Windows package
        shell: pwsh
        env:
          VT_BUILD_CHANNEL: ${{ steps.meta.outputs.channel }}
          VT_SIGN_EXE: ${{ secrets.VT_SIGN_EXE }}
          VT_SIGN_PFX: ${{ secrets.VT_SIGN_PFX }}
          VT_SIGN_PFX_B64: ${{ secrets.VT_SIGN_PFX_B64 }}
          VT_SIGN_PASSWORD: ${{ secrets.VT_SIGN_PASSWORD }}
          VT_SIGN_TIMESTAMP: ${{ secrets.VT_SIGN_TIMESTAMP }}
        run: |
          $projectRoot = Resolve-Path "."
          $buildOutput = Join-Path $projectRoot "VideoTools.exe"
          $appVersionLine = (Get-Content (Join-Path $projectRoot "main.go") | Select-String -Pattern 'appVersion' | Select-Object -First 1).ToString()
          $appVersion = ""
          if ($appVersionLine) {
            $parts = $appVersionLine -split ([char]34)
            if ($parts.Length -ge 2) {
              $appVersion = $parts[1]
            }
          }
          if ([string]::IsNullOrWhiteSpace($appVersion)) {
            $appVersion = "0.1.1-dev"
          }
          $gitCommit = ""
          if (Get-Command git -ErrorAction SilentlyContinue) {
            $gitCommit = (git -C $projectRoot rev-parse --short HEAD 2>$null).Trim()
          }
          if ([string]::IsNullOrWhiteSpace($gitCommit)) {
            $gitCommit = "nogit"
          }
          $channel = "dev"
          $version = $appVersion
          $distDir = Join-Path $projectRoot "dist\\windows\\$channel"
          $artifactName = "$version-$gitCommit`_win.zip"

          if ($env:VT_SIGN_PFX_B64) {
            $pfxPath = Join-Path $env:TEMP "vt-sign.pfx"
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:VT_SIGN_PFX_B64))
            $env:VT_SIGN_PFX = $pfxPath
          }

          $env:CGO_ENABLED = "1"
          go mod download
          go mod verify
          go build -p 4 -ldflags="-s -w" -trimpath -o $buildOutput .

          if ($env:VT_SIGN_EXE -and $env:VT_SIGN_EXE -ne "0") {
            $signScript = Join-Path $projectRoot "scripts\\windows\\support\\sign-exe.ps1"
            if (Test-Path $signScript) {
              & $signScript -ExePath $buildOutput -CertPath $env:VT_SIGN_PFX -CertPassword $env:VT_SIGN_PASSWORD -TimestampUrl $env:VT_SIGN_TIMESTAMP
            }
          }

          if (-not (Test-Path $distDir)) {
            New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          }
          $pkgDir = New-Item -ItemType Directory -Path (Join-Path $env:TEMP "vt-build-$([Guid]::NewGuid())") -Force
          Copy-Item $buildOutput -Destination $pkgDir.FullName -Force
          if (Test-Path (Join-Path $projectRoot "README.md")) {
            Copy-Item (Join-Path $projectRoot "README.md") -Destination $pkgDir.FullName -Force
          }
          if (Test-Path (Join-Path $projectRoot "LICENSE")) {
            Copy-Item (Join-Path $projectRoot "LICENSE") -Destination $pkgDir.FullName -Force
          }
          if (Test-Path (Join-Path $projectRoot "ffmpeg.exe")) {
            Copy-Item (Join-Path $projectRoot "ffmpeg.exe") -Destination $pkgDir.FullName -Force
          }
          if (Test-Path (Join-Path $projectRoot "ffprobe.exe")) {
            Copy-Item (Join-Path $projectRoot "ffprobe.exe") -Destination $pkgDir.FullName -Force
          }
          $artifactPath = Join-Path $distDir $artifactName
          if (Test-Path $artifactPath) {
            Remove-Item $artifactPath -Force
          }
          Compress-Archive -Path (Join-Path $pkgDir.FullName "*") -DestinationPath $artifactPath
          Remove-Item $pkgDir.FullName -Recurse -Force

          $publishedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $buildJson = @{
            channel = $channel
            version = $version
            git = $gitCommit
            published_at = $publishedAt
            artifact = $artifactName
          } | ConvertTo-Json -Depth 3
          Set-Content -Path (Join-Path $distDir "build.json") -Value $buildJson -Encoding UTF8

          $msixBaseVersion = ""
          if ($appVersion -match '^v?(\d+\.\d+\.\d+)') {
            $msixBaseVersion = $Matches[1]
          } else {
            $msixBaseVersion = "0.1.1"
          }
          $msixVersion = "$msixBaseVersion.0"
          try {
            ./packaging/windows/msix/pack.ps1 -InputExe $buildOutput -Version $msixVersion
          } catch {
            Write-Host "[WARN] MSIX packaging skipped: $($_.Exception.Message)" -ForegroundColor Yellow
          }

          if ($env:VT_SIGN_EXE -and $env:VT_SIGN_EXE -ne "0") {
            $msixPath = Join-Path $projectRoot "dist\\windows\\msix\\VideoTools.msix"
            if (Test-Path $msixPath) {
              ./packaging/windows/msix/sign.ps1 -MsixPath $msixPath -PfxPath $env:VT_SIGN_PFX -PfxPassword $env:VT_SIGN_PASSWORD
            }
          }

      - name: Normalize Windows artifact names
        shell: pwsh
        run: |
          $projectRoot = Resolve-Path "."
          $channel = "${{ steps.meta.outputs.channel }}"
          $versionBase = "${{ steps.meta.outputs.version_base }}"
          $distDir = Join-Path $projectRoot "dist\\windows\\$channel"
          $zip = Get-ChildItem -Path $distDir -Filter *.zip | Select-Object -First 1
          if ($zip) {
            $target = Join-Path $distDir "$versionBase`_windows.zip"
            Move-Item -Path $zip.FullName -Destination $target -Force
          }
          $msixPath = Join-Path $projectRoot "dist\\windows\\msix\\VideoTools.msix"
          if (Test-Path $msixPath) {
            $msixTarget = Join-Path $projectRoot "dist\\windows\\msix\\$versionBase`_windows.msix"
            Move-Item -Path $msixPath -Destination $msixTarget -Force
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VideoTools-windows
          path: |
            dist/windows/${{ steps.meta.outputs.channel }}/*
            dist/windows/msix/*

  publish-release:
    runs-on: ubuntu
    needs:
      - linux-package
      - windows-package
    env:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
      FORGEJO_API_URL: ${{ secrets.FORGEJO_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Publish Forgejo release (dev)
        if: env.FORGEJO_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${FORGEJO_API_URL:-}" ]; then
            echo "FORGEJO_API_URL is required in secrets."
            exit 1
          fi

          version_base="$(grep -m1 'appVersion' main.go | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ -z "$version_base" ]; then
            version_base="v0.1.1-dev"
          fi
          channel="stable"
          prerelease="false"
          if echo "$version_base" | grep -q '\-dev'; then
            channel="dev"
            prerelease="true"
          fi

          api_url="${FORGEJO_API_URL}"
          repo="${GITHUB_REPOSITORY}"
          tag="${version_base}"
          name="Build ${version_base}"

          release_payload=$(jq -n \
            --arg tag "${tag}" \
            --arg name "${name}" \
            --arg body "Automated build from ${GITHUB_SHA}." \
            --arg target "${GITHUB_SHA}" \
            --argjson prerelease "${prerelease}" \
            '{
              tag_name: $tag,
              name: $name,
              body: $body,
              draft: false,
              prerelease: $prerelease,
              target_commitish: $target
            }')

          release_json=$(curl -sS -H "Authorization: token ${FORGEJO_TOKEN}" -H "Content-Type: application/json" \
            -X POST "${api_url}/repos/${repo}/releases" -d "${release_payload}" || true)

          release_id=$(echo "${release_json}" | jq -r '.id // empty')
          if [ -z "${release_id}" ]; then
            release_json=$(curl -sS -H "Authorization: token ${FORGEJO_TOKEN}" \
              "${api_url}/repos/${repo}/releases/tags/${tag}" || true)
            release_id=$(echo "${release_json}" | jq -r '.id // empty')
          fi

          if [ -z "${release_id}" ]; then
            echo "Failed to create or find release for tag ${tag}."
            echo "${release_json}"
            exit 1
          fi

          find dist/VideoTools-linux dist/VideoTools-windows -type f -print0 | while IFS= read -r -d '' file; do
            name=$(basename "${file}")
            echo "Uploading ${name}..."
            curl -sS -H "Authorization: token ${FORGEJO_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"${file}" \
              "${api_url}/repos/${repo}/releases/${release_id}/assets?name=${name}" >/dev/null
          done

      - name: Skip release upload (missing token)
        if: env.FORGEJO_TOKEN == ''
        run: |
          echo "FORGEJO_TOKEN not set; skipping release upload."
